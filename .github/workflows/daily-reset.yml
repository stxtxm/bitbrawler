name: Global Daily Reset

on:
  schedule:
    # Two schedules to cover Europe/Paris midnight across DST.
    - cron: '0 22 * * *' # 00:00 Paris during CEST (UTC+2)
    - cron: '0 23 * * *' # 00:00 Paris during CET (UTC+1)
  workflow_dispatch:

jobs:
  daily-reset:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run Global Daily Reset
        id: daily-reset
        continue-on-error: true
        run: npm run daily-reset:run
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Sanity Check
        if: always()
        run: |
          if [ "${{ steps.daily-reset.outcome }}" = "failure" ]; then
            echo "❌ Daily reset step failed. Characters may not have been reset."
            echo "ℹ️ Check Supabase maintenance table for partial completion status."
            exit 0
          fi
          echo "✅ Daily reset step completed successfully"
