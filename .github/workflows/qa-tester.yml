name: QA Tester

on:
  # Cron desactive : utilise cron-job.org (gratuit) pour le declenchement.
  # Voir scripts/dispatch-qa-tester.sh pour la configuration.
  workflow_dispatch:

jobs:
  run-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Run QA Tests
        id: qa-tests
        continue-on-error: true
        run: node qa/qa-bot.mjs
        env:
          QA_HEADLESS: 'true'

      - name: Commit QA stats
        if: always()
        run: |
          git config user.name "opencode-agent"
          git config user.email "agent@opencode.ai"
          git add qa/stats.json qa/state.json
          git diff --cached --quiet || git commit -m "chore: update QA stats"
          git pull --rebase
          git push
