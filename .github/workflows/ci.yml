name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build

  auto-merge:
    needs: check
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.user.login == 'opencode-agent' &&
      contains(github.event.pull_request.labels.*.name, 'auto-generated')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Approve and merge
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr review --approve "${{ github.event.pull_request.html_url }}"
          gh pr merge --squash "${{ github.event.pull_request.html_url }}"
