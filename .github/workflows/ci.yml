name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to check (for reviewer triggering)
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      pull-requests: write
      actions: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Type check with TypeScript
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm test

      - name: Build project
        run: npm run build

      - name: On CI pass — dispatch Reviewer
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || github.event.inputs.pr_number }}"
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR number available — skipping reviewer trigger"
            exit 0
          fi
          echo "✅ CI passed for PR #$PR_NUMBER — triggering reviewer..."
          gh workflow run reviewer.yml -f pr_number="$PR_NUMBER" --repo "${{ github.repository }}"
          echo "✓ Reviewer workflow dispatched for PR #$PR_NUMBER"

      - name: On CI failure — dispatch dev agent to fix
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || github.event.inputs.pr_number }}"
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR number available — cannot re-dispatch agent"
            exit 0
          fi
          echo "❌ CI failed for PR #$PR_NUMBER — re-dispatching dev agent to fix..."
          PR_BODY=$(gh pr view "$PR_NUMBER" --json body --jq '.body // ""' 2>/dev/null || echo "")
          ISSUE_NUMBER=$(echo "$PR_BODY" | grep -oE '#[0-9]+' | head -1 | tr -d '#' || echo "")
          if [ -z "$ISSUE_NUMBER" ]; then
            echo "No linked issue found in PR body — cannot re-dispatch"
            exit 0
          fi
          RETRY_COUNT=$(gh issue view "$ISSUE_NUMBER" --json labels --jq '[.labels[].name | select(startswith("ci-retry-"))] | length' 2>/dev/null || echo 0)
          if [ "$RETRY_COUNT" -ge 3 ]; then
            echo "⛔ Max retries (3) reached for issue #$ISSUE_NUMBER — manual intervention required"
            gh pr comment "$PR_NUMBER" --body "❌ CI failed after 3 retries. Manual intervention required."
            exit 0
          fi
          gh issue edit "$ISSUE_NUMBER" --add-label "ci-retry-$((RETRY_COUNT+1))" 2>/dev/null || true
          echo "Re-dispatching dev agent for issue #$ISSUE_NUMBER (retry #$((RETRY_COUNT+1)))..."
          gh workflow run opencode.yml -f issue_number="$ISSUE_NUMBER" --repo "${{ github.repository }}"
