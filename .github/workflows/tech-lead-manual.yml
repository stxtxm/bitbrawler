name: Tech Lead Manual

on:
  workflow_dispatch:

jobs:
  tech-lead-manual:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 20

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install opencode
        run: npm install -g opencode-ai

      - name: Configure git
        run: |
          git config user.name "opencode-agent"
          git config user.email "agent@opencode.ai"

      - name: Merge eligible agent PRs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr list --state open --json number,author,isDraft,mergeStateStatus,labels --jq '.[]' | while IFS= read -r pr; do
            num=$(echo "$pr" | jq -r '.number')
            author=$(echo "$pr" | jq -r '.author.login // ""')
            draft=$(echo "$pr" | jq -r '.isDraft')
            merge_state=$(echo "$pr" | jq -r '.mergeStateStatus // ""')
            auto_label=$(echo "$pr" | jq -r '[.labels[]?.name] | index("auto-generated") != null')

            if [ "$draft" = "true" ]; then
              continue
            fi
            if [ "$auto_label" != "true" ] && [ "$author" != "app/github-actions" ] && [ "$author" != "opencode-agent" ]; then
              continue
            fi
            if [ "$merge_state" != "CLEAN" ] && [ "$merge_state" != "HAS_HOOKS" ]; then
              continue
            fi

            gh pr merge "$num" --squash --delete-branch || true
          done

      - name: Run Tech Lead agent
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          MODELS=(
            "opencode/deepseek-v4-flash-free"
            "opencode/nemotron"
            "opencode/big-pickle"
          )

          PROMPT="Analyse le repo aujourd'hui. Consulte les stats QA (qa/stats.json), regarde les commits récents, merge les PRs si pas déjà fait, et crée des issues avec /oc pour les améliorations à faire."

          SUCCESS=0
          for MODEL in "${MODELS[@]}"; do
            if opencode run --dangerously-skip-permissions --agent tech-lead --model "$MODEL" "$PROMPT"; then
              SUCCESS=1
              break
            fi
          done

          if [ "$SUCCESS" -ne 1 ]; then
            exit 1
          fi
