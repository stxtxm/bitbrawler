name: PR Reviewer

on:
  pull_request:
    types: [opened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to review
        required: true
        type: string

concurrency:
  group: pr-review-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      actions: write
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 20

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install opencode
        run: npm install -g opencode-ai

      - name: Install dependencies
        run: npm ci

      - name: Wait briefly for CI checks (max 30 seconds)
        id: wait-ci
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || github.event.inputs.pr_number }}"
          echo "PR number: $PR_NUMBER"
          echo "PR_NUMBER=$PR_NUMBER" >> "$GITHUB_ENV"

          echo "Waiting briefly for CI checks on PR #$PR_NUMBER (max 30 seconds)..."
          for i in $(seq 1 3); do
            # Count checks that are not completed or not successful/neutral
            CHECKS=$(gh pr view "$PR_NUMBER" --json statusCheckRollup --jq '
              [.statusCheckRollup[]? | select(
                .status? != "COMPLETED" or (.conclusion? != "SUCCESS" and .conclusion? != "NEUTRAL")
              )] | length
            ' 2>/dev/null || echo "3")
            if [ "$CHECKS" -eq 0 ]; then
              echo "✓ All CI checks passed!"
              exit 0
            fi
            echo "⏳ Waiting... ($i/3, $CHECKS checks remaining)"
            sleep 10
          done

          echo "⚠ Timeout waiting for CI — proceeding with review anyway (assuming Vercel or other slow checks)."
          # Proceed with review even if some checks are still pending

      - name: Check PR author for self-review bypass
        id: check-author
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || github.event.inputs.pr_number }}"
          AUTHOR=$(gh pr view "$PR_NUMBER" --json author --jq '.author.login // ""' 2>/dev/null || echo "")
          echo "PR author: $AUTHOR"
          if [ "$AUTHOR" = "github-actions" ] || [ "$AUTHOR" = "github-actions[bot]" ]; then
            echo "Auto-authored PR — will merge directly without approval"
            echo "SKIP_APPROVAL=true" >> "$GITHUB_ENV"
          else
            echo "Human-authored PR — normal approval process"
            echo "SKIP_APPROVAL=false" >> "$GITHUB_ENV"
          fi
          echo "PR_NUMBER=$PR_NUMBER" >> "$GITHUB_ENV"

      - name: Load agent memory context
        run: |
          echo "📖 Loading memory context..."
          echo "REVIEWER_MEMORY=$(cat .opencode/memory/reviewer.json 2>/dev/null | tr -d '\n' || echo '{}')" >> "$GITHUB_ENV"
          echo "SHARED_MEMORY=$(cat .opencode/memory/shared.json 2>/dev/null | tr -d '\n' || echo '{}')" >> "$GITHUB_ENV"
          echo "✅ Memory loaded"

      - name: Configure git
        run: |
          git config user.name "opencode-agent"
          git config user.email "agent@opencode.ai"

      - name: Verify branch integrity before review
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || github.event.inputs.pr_number }}"
          HEAD_REF=$(gh pr view "$PR_NUMBER" --json headRefName --jq '.headRefName // ""' 2>/dev/null || echo "")

          if [ -z "$HEAD_REF" ]; then
            echo "⚠ Could not determine head ref — skipping integrity check"
            exit 0
          fi

          echo "🔍 Checking out PR branch: $HEAD_REF"
          git fetch origin "$HEAD_REF"
          git checkout "$HEAD_REF" 2>/dev/null || git checkout -b "$HEAD_REF" "origin/$HEAD_REF"

          echo "🔍 Checking for merge conflict markers..."
          if grep -rnP '^<<<<<<< |^=======$|^>>>>>>> ' --include='*.ts' --include='*.tsx' --include='*.json' src/; then
            echo "❌ Conflict markers found — requesting changes"
            gh pr review "$PR_NUMBER" --request-changes --body "❌ Des marqueurs de conflit (\`<<<<<<<\`) sont présents dans le code. Le merge auto a échoué. Merci de rebase manuellement sur master et de résoudre les conflits."
            exit 1
          fi
          echo "✅ No conflict markers found"

          echo "🔍 Checking TypeScript compilation..."
          if ! npx tsc --noEmit; then
            echo "❌ TypeScript errors — preventing merge"
            gh pr review "$PR_NUMBER" --request-changes --body "❌ Le code contient des erreurs TypeScript. Le merge automatique a probablement corrompu des fichiers (conflits silencieux). Merci de corriger et repousser."
            exit 1
          fi
          echo "✅ TypeScript compilation clean — branch ready for review"

      - name: Check dependencies (depends-on resolution)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || github.event.inputs.pr_number }}"
          PR_BODY=$(gh pr view "$PR_NUMBER" --json body --jq '.body // ""' 2>/dev/null || echo "")
          ISSUE_NUMBER=$(echo "$PR_BODY" | grep -oiE '(close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)\s+#[0-9]+' | grep -oE '#[0-9]+' | tr -d '#' | head -1 || echo "")

          if [ -z "$ISSUE_NUMBER" ]; then
            echo "ℹ No linked issue — skipping dependency check"
            exit 0
          fi

          # Extract depends-on from issue body
          DEPS=$(gh issue view "$ISSUE_NUMBER" --json body --jq '.body' 2>/dev/null | grep -oiE 'depends-on:\s*#[0-9]+' | grep -oE '#[0-9]+' | tr -d '#' || echo "")

          if [ -z "$DEPS" ]; then
            echo "ℹ Issue #$ISSUE_NUMBER has no dependencies"
            exit 0
          fi

          echo "🔍 Dependencies found: #$(echo "$DEPS" | tr '\n' ' ')"
          for DEP in $DEPS; do
            # Check if the dependency issue itself is closed
            DEP_STATE=$(gh issue view "$DEP" --json state --jq '.state' 2>/dev/null || echo "OPEN")
            if [ "$DEP_STATE" != "CLOSED" ]; then
              echo "⛔ Dependency #$DEP is still open — blocking PR #$PR_NUMBER"
              gh pr review "$PR_NUMBER" --request-changes --body \
                "⛔ Cette PR dépend de #$DEP qui n'est pas encore fermée. Merge bloqué dans l'ordre du DAG."
              exit 1
            fi
            # Check that the dependency has a merged PR
            DEP_PR=$(gh pr list --state merged --head "feat/auto-$DEP" --json number --jq '.[0].number' 2>/dev/null || echo "")
            if [ -z "$DEP_PR" ]; then
              echo "⚠ Dependency #$DEP is closed but no merged PR found — manual check advised"
            else
              echo "✓ Dependency #$DEP resolved by PR #$DEP_PR"
            fi
          done
          echo "✅ All dependencies resolved"

      - name: Detect SQL migration in PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || github.event.inputs.pr_number }}"
          PR_DIFF=$(gh pr diff "$PR_NUMBER" 2>/dev/null || echo "")

          # Check for SQL ALTER TABLE / CREATE TABLE statements
          if echo "$PR_DIFF" | grep -qiE '(ALTER TABLE|CREATE TABLE|DROP TABLE|CREATE INDEX|ALTER COLUMN)'; then
            echo "⛔ SQL migration detected in PR #$PR_NUMBER — blocking merge"
            gh pr review "$PR_NUMBER" --request-changes --body \
              "⛔ **Migration SQL détectée dans le code.** Conformément aux règles du projet, toute modification de schéma doit passer par une issue de migration séparée, exécutée manuellement dans Supabase Dashboard.\n\nMerci de retirer les instructions SQL de cette PR et de créer une issue de migration avec le format décrit dans AGENTS.md."
            exit 1
          fi
          echo "✅ No SQL migration detected"

      - name: Run Reviewer agent
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          SKIP_APPROVAL: ${{ env.SKIP_APPROVAL }}
        run: |
          PR_DIFF=$(gh pr diff "$PR_NUMBER" 2>/dev/null || echo "")
          PR_TITLE=$(gh pr view "$PR_NUMBER" --json title --jq '.title // ""' 2>/dev/null || echo "")
          PR_BODY=$(gh pr view "$PR_NUMBER" --json body --jq '.body // ""' 2>/dev/null || echo "")
          HEAD_REF=$(gh pr view "$PR_NUMBER" --json headRefName --jq '.headRefName // ""' 2>/dev/null || echo "")

          # Extract linked issue from PR body (Closes #N or Fixes #N)
          ISSUE_NUMBER=$(echo "$PR_BODY" | grep -oE '(close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)\s+#[0-9]+' | grep -oE '#[0-9]+' | tr -d '#' | head -1 || echo "")

          ISSUE_BODY=""
          ISSUE_TITLE=""
          if [ -n "$ISSUE_NUMBER" ]; then
            ISSUE_TITLE=$(gh issue view "$ISSUE_NUMBER" --json title --jq '.title // ""' 2>/dev/null || echo "")
            ISSUE_BODY=$(gh issue view "$ISSUE_NUMBER" --json body --jq '.body // ""' 2>/dev/null || echo "")
          fi

          MODEL_ATTEMPTS=0
          MODELS=(
            "opencode/deepseek-v4-flash-free"
            "opencode/nemotron"
            "opencode/big-pickle"
          )

          PROMPT="Tu es le reviewer de Bitbrawler. Review la PR #${PR_NUMBER}.

            ## PR : ${PR_TITLE}
            \`\`\`
            ${PR_DIFF}
            \`\`\`

            ## Issue liée #${ISSUE_NUMBER:-"aucune"}
            Titre: ${ISSUE_TITLE:-"N/A"}
            Body: ${ISSUE_BODY:-"N/A"}

            ## Mémoire des sessions précédentes
            Mémoire REVIEWER : ${{ env.REVIEWER_MEMORY }}
            Mémoire commune : ${{ env.SHARED_MEMORY }}

            ## Instructions de review

            1. **Pertinence** : le code résout-il le problème décrit dans l'issue liée ? Si pas d'issue liée, le changement a-t-il du sens ?
            2. **Périmètre** : y a-t-il des modifications non liées à l'issue (scope creep) ?
            3. **Conventions du projet** :
               - Pas de commentaires dans le code
               - Pas de \`any\` TypeScript evade
               - Imports propres (pas d'imports inutilisés)
               - Pas de duplication de code
            4. **Commits** : le message de commit suit conventional commits (feat:/fix:/refactor:/chore:/test:)
            5. **Tests** : les nouveaux cas sont-ils testés ? Les tests existants passent-ils toujours ?
            6. **Régression** : le changement peut-il casser une autre partie du projet ?
            7. **Sécurité** : pas d'injection SQL Supabase, pas de secrets exposés
            8. **Performance** : pas de boucles inutiles, pas de requêtes N+1 Supabase

             ## Règles
            - Si SKIP_APPROVAL=true (PR auto-générée par bot) → passe directement au merge sans approval: \`gh pr merge "$PR_NUMBER" --squash --delete-branch\`
            - Sinon, si CI est verte ✅ et tout est bon → \`gh pr review --approve "$PR_NUMBER"\` puis \`gh pr merge "$PR_NUMBER" --squash --delete-branch\`
            - Si CI est rouge → \`gh pr review "$PR_NUMBER" --request-changes --body "feedback..."\` même si l'erreur est préexistante (cela déclenche le dev agent qui corrigera)
            - NE JAMAIS approuver si CI est rouge
            - NE JAMAIS merge si le code a des problèmes de sécurité
            - Si le changement semble bon mais mérite un suivi, approuve + crée une issue de suivi avec \`gh issue create\`
            - Nettoie la branche après merge

            Variable d'environnement disponible: SKIP_APPROVAL=$SKIP_APPROVAL"

          SUCCESS=0
          for MODEL in "${MODELS[@]}"; do
            MODEL_ATTEMPTS=$((MODEL_ATTEMPTS + 1))
            echo "Trying model: $MODEL (attempt $MODEL_ATTEMPTS)"
            if opencode run --dangerously-skip-permissions --agent reviewer --model "$MODEL" "$PROMPT"; then
              echo "Model selected: $MODEL"
              SUCCESS=1
              break
            fi
             echo "Model failed: $MODEL"
           done

           if [ "$SUCCESS" -ne 1 ]; then
             echo "All model attempts failed."
             gh pr comment "$PR_NUMBER" --body "❌ Reviewer agent unavailable. Manual review required."
             exit 1
           fi

      - name: Auto-close linked issue if not already closed
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || github.event.inputs.pr_number }}"

          # Get PR body to find "Closes #XYZ"
          PR_BODY=$(gh pr view "$PR_NUMBER" --json body --jq '.body // ""' 2>/dev/null || echo "")

          # Extract issue number from PR body (Closes #N pattern)
          ISSUE_NUMBER=$(echo "$PR_BODY" | grep -oiE '(close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)\s+#[0-9]+' | grep -oE '#[0-9]+' | tr -d '#' | head -1 || echo "")

          if [ -z "$ISSUE_NUMBER" ]; then
            echo "ℹ No linked issue found in PR body"
            exit 0
          fi

          # Check if PR was merged
          PR_STATE=$(gh pr view "$PR_NUMBER" --json state --jq '.state' 2>/dev/null || echo "")
          if [ "$PR_STATE" != "MERGED" ]; then
            echo "ℹ PR not merged (state: $PR_STATE), skipping issue close"
            exit 0
          fi

          # Check if issue is still open
          ISSUE_STATE=$(gh issue view "$ISSUE_NUMBER" --json state --jq '.state' 2>/dev/null || echo "")
          if [ "$ISSUE_STATE" = "CLOSED" ]; then
            echo "✓ Issue #$ISSUE_NUMBER already closed"
            exit 0
          fi

          # Close the issue
          echo "Closing issue #$ISSUE_NUMBER..."
          gh issue close "$ISSUE_NUMBER" --comment "Resolved by PR #$PR_NUMBER (merged)"
          echo "✓ Issue #$ISSUE_NUMBER closed"

      - name: Save reviewer session memory
        if: always()
        run: |
          if [ -f /tmp/agent-session-notes.json ]; then
            NOTES=$(cat /tmp/agent-session-notes.json)
            CURRENT=$(cat .opencode/memory/reviewer.json 2>/dev/null || echo '{}')
            UPDATED=$(echo "$CURRENT" | jq --argjson notes "$NOTES" --arg date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" '
              .last_session = $date | .session_notes += [$notes]
            ')
            echo "$UPDATED" > .opencode/memory/reviewer.json
            git add .opencode/memory/reviewer.json && git commit -m "chore: update reviewer memory [skip ci]" || true
            echo "✅ Reviewer memory updated"
          else
            echo "ℹ No session notes found"
          fi
        shell: bash

      - name: Check campaign — dispatch supervisor if all sub-issues done
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || github.event.inputs.pr_number }}"
          PR_BODY=$(gh pr view "$PR_NUMBER" --json body --jq '.body // ""' 2>/dev/null || echo "")
          ISSUE_NUMBER=$(echo "$PR_BODY" | grep -oiE '(close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)\s+#[0-9]+' | grep -oE '#[0-9]+' | tr -d '#' | head -1 || echo "")
          if [ -z "$ISSUE_NUMBER" ]; then
            echo "ℹ No linked issue — skipping campaign check"
            exit 0
          fi
          # Check if issue has campaign-* labels
          CAMPAIGN_LABELS=$(gh issue view "$ISSUE_NUMBER" --json labels --jq '[.labels[].name | select(startswith("campaign-"))] | .[]' 2>/dev/null || echo "")
          if [ -z "$CAMPAIGN_LABELS" ]; then
            echo "ℹ Issue #$ISSUE_NUMBER is not part of a campaign — skipping"
            exit 0
          fi
          for CAMPAIGN in $CAMPAIGN_LABELS; do
            PARENT_NUMBER=$(echo "$CAMPAIGN" | sed 's/campaign-//')
            echo "🔍 Checking campaign $CAMPAIGN (parent issue #$PARENT_NUMBER)..."
            REMAINING=$(gh issue list --label "$CAMPAIGN" --state open --json number --jq 'length' 2>/dev/null || echo "1")
            if [ "$REMAINING" -eq 0 ]; then
              echo "✅ All sub-issues of campaign $CAMPAIGN are closed!"
              echo "Dispatching supervisor for parent issue #$PARENT_NUMBER..."
              gh workflow run opencode.yml -f issue_number="$PARENT_NUMBER" -f mode=supervisor --repo "${{ github.repository }}"
              echo "✓ Supervisor dispatched for #$PARENT_NUMBER"
            else
              echo "⏳ $REMAINING sub-issue(s) still open in campaign $CAMPAIGN — waiting"
            fi
          done