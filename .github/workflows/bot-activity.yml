name: Bot Activity

on:
  # Cron desactive : utilise cron-job.org (gratuit) pour le declenchement.
  # Voir scripts/dispatch-bot-activity.sh pour la configuration.
  workflow_dispatch:

jobs:
  run-bots:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Bot Engine
        id: bot-engine
        continue-on-error: true
        run: npx tsx scripts/bot-engine.ts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Sanity Check
        if: always()
        run: |
          if [ "${{ steps.bot-engine.outcome }}" = "failure" ]; then
            echo "❌ Bot engine step failed. Level 1 bot pool may be low."
            echo "ℹ️ The final guarantee check in the engine should have spawned bots if needed."
            exit 0
          fi
          echo "✅ Bot engine step completed successfully"
