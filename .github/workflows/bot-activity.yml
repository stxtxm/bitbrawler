name: Bot Activity

on:
  schedule:
    # Run every 2 hours (UTC).
    - cron: '0 */2 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  run-bots:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run Bot Engine
        id: bot-engine
        continue-on-error: true
        run: npx tsx scripts/bot-engine.ts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Sanity Check
        if: always()
        run: |
          if [ "${{ steps.bot-engine.outcome }}" = "failure" ]; then
            echo "❌ Bot engine step failed. Level 1 bot pool may be low."
            echo "ℹ️ The final guarantee check in the engine should have spawned bots if needed."
            exit 0
          fi
          echo "✅ Bot engine step completed successfully"
