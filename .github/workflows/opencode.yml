name: OpenCode Agent

on:
  issues:
    types: [opened, edited]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to implement
        required: true
        type: string
      mode:
        description: Agent mode (dev or supervisor)
        required: false
        default: dev
        type: choice
        options:
          - dev
          - supervisor

jobs:
  implement:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'issues' &&
        (
          contains(github.event.issue.body, '/oc') ||
          contains(github.event.issue.body, '/opencode')
        )
      ) ||
      (
        github.event_name == 'pull_request_review' &&
        github.event.review.state == 'changes_requested' &&
        startsWith(github.event.pull_request.head.ref, 'feat/auto-')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: write
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install opencode
        run: npm install -g opencode-ai

      - name: Install dependencies
        run: npm ci

      - name: Configure git
        run: |
          git config user.name "opencode-agent"
          git config user.email "agent@opencode.ai"

      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for LABEL in auto-generated dispatched sub-issue; do
            COLOR="grey"
            [ "$LABEL" = "sub-issue" ] && COLOR="1d76db"
            gh label get "$LABEL" 2>/dev/null || \
              gh label create "$LABEL" --color "$COLOR" --description "Auto-managed by OpenCode agent" 2>/dev/null || true
          done

      - name: Resolve issue context
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER_INPUT: ${{ github.event.inputs.issue_number }}
          ISSUE_NUMBER_EVENT: ${{ github.event.issue.number }}
          PR_NUMBER_REVIEW: ${{ github.event.pull_request.number }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request_review" ]; then
            # Triggered by a review requesting changes on a feat/auto- PR
            PR_NUMBER="$PR_NUMBER_REVIEW"
            PR_BODY=$(gh pr view "$PR_NUMBER" --json body --jq '.body // ""')
            LINKED_ISSUE=$(echo "$PR_BODY" | grep -oE '#[0-9]+' | head -1 | tr -d '#')
            if [ -n "$LINKED_ISSUE" ]; then
              ISSUE_NUMBER="$LINKED_ISSUE"
              gh issue view "$ISSUE_NUMBER" --json body --jq '.body' > /tmp/prompt.txt 2>/dev/null || echo "" > /tmp/prompt.txt
              gh issue view "$ISSUE_NUMBER" --json title --jq '.title' > /tmp/issue-title.txt 2>/dev/null || echo "Fix PR #$PR_NUMBER" > /tmp/issue-title.txt
            else
              ISSUE_NUMBER="$PR_NUMBER"
              echo "" > /tmp/prompt.txt
              echo "Fix PR #$PR_NUMBER" > /tmp/issue-title.txt
            fi
            echo "ISSUE_NUMBER=$ISSUE_NUMBER" >> "$GITHUB_ENV"
            echo "Triggered by review on PR #$PR_NUMBER (linked issue: #$LINKED_ISSUE)"
            exit 0
          fi

          ISSUE_NUMBER="$ISSUE_NUMBER_EVENT"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ISSUE_NUMBER="$ISSUE_NUMBER_INPUT"
          fi

          if [ -z "$ISSUE_NUMBER" ]; then
            echo "Issue number is required."
            exit 1
          fi

          gh issue view "$ISSUE_NUMBER" --json body --jq '.body' > /tmp/prompt.txt
          gh issue view "$ISSUE_NUMBER" --json title --jq '.title' > /tmp/issue-title.txt
          echo "ISSUE_NUMBER=$ISSUE_NUMBER" >> "$GITHUB_ENV"

      - name: Create branch
        run: |
          # Ensure we have the latest master
          git fetch origin master
          git checkout master
          git pull origin master
          
          BRANCH="feat/auto-$ISSUE_NUMBER"
          if git ls-remote --exit-code origin "refs/heads/$BRANCH" 2>/dev/null; then
            echo "Branch $BRANCH already exists on remote — checking out"
            git fetch origin "$BRANCH"
            git checkout -b "$BRANCH" "origin/$BRANCH"
            git rebase origin/master || echo "Rebase failed, continuing with existing branch"
          else
            git checkout -b "$BRANCH" master
          fi
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Check for existing PR
        id: check_pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || true)
          echo "EXISTING_PR=$EXISTING_PR" >> "$GITHUB_ENV"
          echo "existing_pr=$EXISTING_PR" >> "$GITHUB_OUTPUT"

      - name: Create campaign label for this issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label get "campaign-$ISSUE_NUMBER" 2>/dev/null || \
            gh label create "campaign-$ISSUE_NUMBER" --color "fbca04" --description "Campaign parent: #$ISSUE_NUMBER" 2>/dev/null || true
          echo "✓ campaign-$ISSUE_NUMBER label ready"

      - name: Mark issue scan start
        run: echo "SCAN_START=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Run Supervisor agent
        if: github.event.inputs.mode == 'supervisor'
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "🔍 Supervisor mode — validating campaign for issue #$ISSUE_NUMBER..."
          PROMPT="Tu es le superviseur de campagne. Valide la campagne #$ISSUE_NUMBER et mets à jour la documentation.

          ## Issue #$ISSUE_NUMBER
          Titre: $(gh issue view "$ISSUE_NUMBER" --json title --jq '.title // ""')
          Body: $(gh issue view "$ISSUE_NUMBER" --json body --jq '.body // ""')
          
          ## Instructions
          1. Vérifie que toutes les sous-issues (label campaign-$ISSUE_NUMBER) sont fermées
          2. Trouve les PRs associées à chaque sous-issue
          3. Exécute les tests de validation (npm run lint && npm test && npm run build)
          4. Met à jour les notes de patch dans src/data/updateNotes.ts :
             - Lis le dernier numéro de version (ex: 3.3.0) et incrémente (devient 3.4.0)
             - Ajoute une nouvelle entrée EN HAUT du tableau UPDATE_NOTES
             - Utilise la date du jour (date +%Y-%m-%d)
             - Résume les changements à partir des titres et descriptions des PRs mergées
             - Chaque changement est une ligne de texte lisible par un joueur
          5. Met à jour README.md si la feature ajoute une capacité joueur notable :
             - Lis la section '## Features'
             - Ajoute une ligne décrivant la nouvelle feature dans la liste
          6. N'oublie PAS le fichier de test src/test/unit/updateNotes.test.ts si la structure change
          7. Commit les changements:
             git add src/data/updateNotes.ts README.md src/test/unit/updateNotes.test.ts
             git commit -m \"docs: add vX.Y.Z patch notes for campaign #$ISSUE_NUMBER\" || true
             git push origin master
          8. Poste un rapport récapitulatif sur l'issue #$ISSUE_NUMBER
          9. Ferme l'issue #$ISSUE_NUMBER si tout est OK
          
          Tu es superviseur + documentaliste. Tu DOIS modifier les fichiers de documentation et les committer."
          
          opencode run --dangerously-skip-permissions --agent supervisor --model "opencode/deepseek-v4-flash-free" "$PROMPT"
          echo "✅ Supervisor agent completed"

      - name: Implement (new PR)
        if: github.event.inputs.mode != 'supervisor' && steps.check_pr.outputs.existing_pr == ''
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ env.ISSUE_NUMBER }}
        run: |
          ISSUE_BODY=$(cat /tmp/prompt.txt)
          ISSUE_TITLE=$(cat /tmp/issue-title.txt)

          PROMPT="
          Tu es le dev agent de Bitbrawler.

          ## Issue #${ISSUE_NUMBER}
          Titre: ${ISSUE_TITLE}
          Description: ${ISSUE_BODY}

          ## Règles
          - Écris du code clean, testé, sans commentaires
          - Exécute les tests (npm test) et le build (npm run build)
          - Ne modifie PAS .github/workflows/*.yml

          ## Feature complexe ? Crée une campagne
          Si le changement demandé nécessite PLUSIEURS étapes ou fichiers (ex: nouvelle fonctionnalité complète) :
          1. Découpe en sous-tâches (issues GitHub) via gh issue create
          2. Chaque sous-tâche DOIT contenir /oc dans son body pour être auto-dispatchée
          3. Ajoute le label campaign-${ISSUE_NUMBER} à chaque sous-tâche
          4. Ne code QUE ce qui peut être fait en un seul bloc logique
          5. Le reste sera traité automatiquement via les sous-issues

          Exemple de sous-issue :
          gh issue create \\
            --title \"feat: ajouter le système de quêtes quotidiennes - base de données\" \\
            --label \"campaign-${ISSUE_NUMBER}\" \\
            --body 'Créer les tables Supabase pour les quêtes quotidiennes... /oc'

          ## Instructions techniques
          - N'ajoute PAS de commentaires dans le code
          - N'utilise PAS le type 'any'
          - Suis les conventions du projet (fichiers voisins, structure existante)
          "

          MODELS=(
            "opencode/deepseek-v4-flash-free"
          )
          SUCCESS=0
          for MODEL in "${MODELS[@]}"; do
            echo "Trying model: $MODEL"
            if opencode run --dangerously-skip-permissions --model "$MODEL" "$PROMPT"; then
              echo "Model selected: $MODEL"
              SUCCESS=1
              break
            fi
            echo "Model failed: $MODEL"
          done
          if [ "$SUCCESS" -ne 1 ]; then
            echo "All model attempts failed."
            exit 1
          fi

      - name: Implement (fix existing PR)
        if: github.event.inputs.mode != 'supervisor' && steps.check_pr.outputs.existing_pr != ''
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ steps.check_pr.outputs.existing_pr }}"
          echo "Existing PR #$PR_NUMBER — fetching CI/review feedback..."

          # Get PR diff, comments, reviews, and CI check results
          PR_DIFF=$(gh pr diff "$PR_NUMBER" 2>/dev/null || echo "")
          PR_COMMENTS=$(gh api "/repos/${{ github.repository }}/issues/$PR_NUMBER/comments" --jq '.[].body' 2>/dev/null || echo "")
          PR_REVIEWS=$(gh api "/repos/${{ github.repository }}/pulls/$PR_NUMBER/reviews" --jq '.[].body' 2>/dev/null || echo "")
          CI_CHECKS=$(gh pr view "$PR_NUMBER" --json statusCheckRollup --jq '
            [.statusCheckRollup[]? | select(.conclusion? == "FAILURE" or .conclusion? == "ACTION_REQUIRED") |
              {name: .name, conclusion: .conclusion}
            ]' 2>/dev/null || echo "")

          # Get original issue
          ISSUE_TITLE=$(cat /tmp/issue-title.txt)
          ISSUE_BODY=$(cat /tmp/prompt.txt)

          PROMPT="
          Tu dois CORRIGER la PR #$PR_NUMBER. La CI a échoué ou le reviewer a demandé des changements.

          ## Issue originale #$ISSUE_NUMBER
          Titre: $ISSUE_TITLE
          Description: $ISSUE_BODY

          ## État actuel de la PR
          \`\`\`diff
          $PR_DIFF
          \`\`\`

          ## Commentaires sur la PR
          $PR_COMMENTS

          ## Reviews demandant des changements
          $PR_REVIEWS

          ## Checks CI en échec
          $CI_CHECKS

          ## Instructions
          1. Analyse les retours CI et les commentaires de review
          2. Corrige les problèmes identifiés
          3. Les tests doivent passer (npm test)
          4. Le build doit passer (npm run build)
          5. N'ajoute pas de commentaires dans le code
          "

          MODELS=(
            "opencode/deepseek-v4-flash-free"
          )
          SUCCESS=0
          for MODEL in "${MODELS[@]}"; do
            echo "Trying model: $MODEL"
            if opencode run --dangerously-skip-permissions --model "$MODEL" "$PROMPT"; then
              echo "Model selected: $MODEL"
              SUCCESS=1
              break
            fi
            echo "Model failed: $MODEL"
          done
          if [ "$SUCCESS" -ne 1 ]; then
            echo "All model attempts failed."
            gh pr comment "$PR_NUMBER" --body "❌ Agent unable to fix issues. Manual intervention required."
            exit 1
          fi

      - name: Validate and retry (lint → test → build — recall agent on failure)
        if: success() && github.event.inputs.mode != 'supervisor'
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          MAX_RETRIES=3
          ISSUE_TITLE=$(cat /tmp/issue-title.txt 2>/dev/null || echo "Auto-implement issue #$ISSUE_NUMBER")
          ISSUE_BODY=$(cat /tmp/prompt.txt 2>/dev/null || echo "Implement the described feature")

          for ATTEMPT in $(seq 0 $MAX_RETRIES); do
            echo "========== Validation attempt $((ATTEMPT+1))/$((MAX_RETRIES+1)) =========="

            # Lint (auto-fix first)
            npm run lint -- --fix 2>/dev/null || true
            npm run lint > /tmp/lint_out.txt 2>&1 && LINT_OK=true || LINT_OK=false

            # Tests
            npm test > /tmp/test_out.txt 2>&1 && TEST_OK=true || TEST_OK=false

            # Build
            npm run build > /tmp/build_out.txt 2>&1 && BUILD_OK=true || BUILD_OK=false

            # Print results
            [ "$LINT_OK" = true ] && echo "✅ Lint passed" || echo "❌ Lint failed"
            [ "$TEST_OK" = true ] && echo "✅ Tests passed" || echo "❌ Tests failed"
            [ "$BUILD_OK" = true ] && echo "✅ Build passed" || echo "❌ Build failed"

            if [ "$LINT_OK" = true ] && [ "$TEST_OK" = true ] && [ "$BUILD_OK" = true ]; then
              echo "✅ All checks passed!"
              exit 0
            fi

            if [ "$ATTEMPT" -ge "$MAX_RETRIES" ]; then
              echo "❌ Validation failed after $((MAX_RETRIES+1)) attempts — giving up"
              cat /tmp/lint_out.txt
              cat /tmp/test_out.txt
              cat /tmp/build_out.txt
              exit 1
            fi

            echo "❌ Validation failed — recalling agent to fix (retry $((ATTEMPT+2))/$((MAX_RETRIES+1)))..."

            # Build prompt from temp files to avoid YAML multi-line parse issues
            echo "Corrige les erreurs dans le code pour que tous les checks passent.
            
            Issue ##$ISSUE_NUMBER
            Titre: $ISSUE_TITLE
            Description: $ISSUE_BODY
            " > /tmp/fix_prompt.txt

            if [ "$LINT_OK" != true ]; then
              echo "### ❌ Lint errors" >> /tmp/fix_prompt.txt
              cat /tmp/lint_out.txt >> /tmp/fix_prompt.txt
              echo "" >> /tmp/fix_prompt.txt
            fi
            if [ "$TEST_OK" != true ]; then
              echo "### ❌ Test failures" >> /tmp/fix_prompt.txt
              cat /tmp/test_out.txt >> /tmp/fix_prompt.txt
              echo "" >> /tmp/fix_prompt.txt
            fi
            if [ "$BUILD_OK" != true ]; then
              echo "### ❌ Build errors" >> /tmp/fix_prompt.txt
              cat /tmp/build_out.txt >> /tmp/fix_prompt.txt
              echo "" >> /tmp/fix_prompt.txt
            fi

            {
              echo "## Règles"
              echo "- Ne modifie que le nécessaire pour corriger les erreurs"
              echo "- N'ajoute PAS de commentaires dans le code"
              echo "- Ne touche PAS à .github/workflows/*.yml"
              echo "- Exécute les corrections puis exécute la validation complète"
            } >> /tmp/fix_prompt.txt

            FIX_PROMPT=$(cat /tmp/fix_prompt.txt)

            echo "--- Agent fix prompt ---"
            echo "$FIX_PROMPT" | head -50
            echo "---"

            opencode run --dangerously-skip-permissions --model "opencode/deepseek-v4-flash-free" "$FIX_PROMPT"
          done

      - name: Push and manage PR
        id: pr_create
        if: success() && github.event.inputs.mode != 'supervisor'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git add -A
          # Detect and reject any .github/workflows/ changes — agent must never touch these
          if git diff --cached --name-only | grep -q '^\.github/workflows/'; then
            echo "⛔ Agent attempted to modify .github/workflows/ files — stripping them from commit"
            git restore --staged .github/workflows/
            git checkout -- .github/workflows/ 2>/dev/null || true
            git add -A
          fi
          if git diff --cached --quiet; then
            echo "No unstaged changes. Checking for unpushed commits..."
            # Count commits ahead of remote branch (handles both existing and new branches)
            COMMITS=$(git log --oneline "origin/${BRANCH}..HEAD" 2>/dev/null | wc -l)
            if [ "$COMMITS" -eq 0 ]; then
              if git ls-remote --exit-code origin "refs/heads/${BRANCH}" >/dev/null 2>&1; then
                echo "Branch exists on remote but no new commits locally — checking for existing PR..."
                EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || true)
                if [ -n "$EXISTING_PR" ]; then
                  echo "Found existing PR #$EXISTING_PR — skipping creation"
                  echo "PR_NUMBER=$EXISTING_PR" >> $GITHUB_OUTPUT
                  exit 0
                fi
                echo "No PR exists — will create from existing remote branch"
              else
                # New branch — count commits since branching from master
                COMMITS=$(git log --oneline origin/master..HEAD 2>/dev/null | wc -l)
                if [ "$COMMITS" -eq 0 ]; then
                  echo "No commits found — no changes to push"
                  echo "PR_NUMBER=" >> $GITHUB_OUTPUT
                  exit 0
                fi
                echo "Found unpushed commits — pushing (new branch)"
              fi
            else
              echo "Found unpushed commits — pushing"
            fi
          else
            git commit -m "feat: auto-implement #$ISSUE_NUMBER"
          fi
          git push origin "$BRANCH" -f

          gh label get auto-generated 2>/dev/null && LABEL_FLAG="--label auto-generated" || LABEL_FLAG=""

          PR_NUMBER="${{ steps.check_pr.outputs.existing_pr }}"
          if [ -n "$PR_NUMBER" ]; then
            echo "Updating existing PR #$PR_NUMBER — new changes pushed"
            gh pr edit "$PR_NUMBER" \
              --title "$(cat /tmp/issue-title.txt)" \
              --body "Closes #$ISSUE_NUMBER" \
              $LABEL_FLAG
            gh pr merge --auto --squash "$PR_NUMBER" 2>/dev/null || true
            PR_URL="https://github.com/${{ github.repository }}/pull/$PR_NUMBER"
          else
            PR_URL=$(gh pr create \
              --title "$(cat /tmp/issue-title.txt)" \
              --body "Closes #$ISSUE_NUMBER" \
              --base master \
              $LABEL_FLAG)
            PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$' || true)
            gh pr merge --auto --squash "$PR_NUMBER" 2>/dev/null || true
          fi
          echo "PR_NUMBER=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "✓ PR #$PR_NUMBER: $PR_URL"

      - name: Dispatch newly created /oc issues
        if: success() && github.event.inputs.mode != 'supervisor'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "🔍 Scanning for new issues with /oc created by agent..."
          ISSUES_FILE=/tmp/opencode-fresh-issues.txt

          gh api "repos/${GITHUB_REPOSITORY}/issues?state=open&sort=created&direction=desc&per_page=100&since=${SCAN_START}" \
            --jq '.[] | select(.pull_request | not) | @base64' > "$ISSUES_FILE"

          FOUND=0
          while IFS= read -r row; do
            [ -z "$row" ] && continue

            json=$(printf '%s' "$row" | base64 --decode)
            number=$(echo "$json" | jq -r '.number')
            body=$(echo "$json" | jq -r '.body // ""')

            # Skip the current issue (prevent re-dispatch loop)
            [ "$number" = "$ISSUE_NUMBER" ] && continue

            # Only dispatch if body contains /oc or /opencode
            if ! printf '%s' "$body" | grep -qiE '(^|[[:space:]])/(oc|opencode)($|[[:space:]])'; then
              continue
            fi

            # Mark as dispatched and trigger workflow
            echo "Dispatching issue #$number..."
            gh issue edit "$number" --add-label dispatched 2>/dev/null || true
            gh workflow run opencode.yml -f issue_number="$number" --repo "${{ github.repository }}"
            echo "✓ Dispatched #$number"
            FOUND=1
            sleep 2
          done < "$ISSUES_FILE"

          if [ "$FOUND" -eq 0 ]; then
            echo "ℹ No new /oc issues found since scan start"
          fi

      - name: Trigger CI workflow
        if: steps.pr_create.outputs.PR_NUMBER != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ steps.pr_create.outputs.PR_NUMBER }}"
          echo "Triggering CI for PR #$PR_NUMBER on branch $BRANCH..."
          gh workflow run ci.yml --ref "$BRANCH" -f pr_number="$PR_NUMBER"

      - name: Trigger Reviewer workflow
        if: steps.pr_create.outputs.PR_NUMBER != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run reviewer.yml -f pr_number=${{ steps.pr_create.outputs.PR_NUMBER }}
