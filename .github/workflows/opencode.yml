name: OpenCode Agent

on:
  issues:
    types: [opened, edited]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to implement
        required: true
        type: string
      mode:
        description: Agent mode (dev or supervisor)
        required: false
        default: dev
        type: choice
        options:
          - dev
          - supervisor

jobs:
  implement:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'issues' &&
        (
          contains(github.event.issue.body, '/oc') ||
          contains(github.event.issue.body, '/Oc') ||
          contains(github.event.issue.body, '/OC') ||
          contains(github.event.issue.body, '/oC') ||
          contains(github.event.issue.body, '/opencode') ||
          contains(github.event.issue.body, '/proposal')
        )
      ) ||
      (
        github.event_name == 'pull_request_review' &&
        github.event.review.state == 'changes_requested' &&
        contains(github.event.pull_request.head.ref, 'feat/auto-')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: write
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install opencode
        run: npm install -g opencode-ai

      - name: Install dependencies
        run: npm ci

      - name: Load agent memory context
        run: |
          echo "📖 Loading memory context..."
          echo "DEV_MEMORY=$(cat .opencode/memory/dev.json 2>/dev/null | tr -d '\n' || echo '{}')" >> "$GITHUB_ENV"
          echo "SHARED_MEMORY=$(cat .opencode/memory/shared.json 2>/dev/null | tr -d '\n' || echo '{}')" >> "$GITHUB_ENV"
          echo "✅ Memory loaded"

      - name: Configure git
        run: |
          git config user.name "opencode-agent"
          git config user.email "agent@opencode.ai"

      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for LABEL in auto-generated dispatched sub-issue; do
            COLOR="grey"
            [ "$LABEL" = "sub-issue" ] && COLOR="1d76db"
            gh label get "$LABEL" 2>/dev/null || \
              gh label create "$LABEL" --color "$COLOR" --description "Auto-managed by OpenCode agent" 2>/dev/null || true
          done

      - name: Resolve issue context
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER_INPUT: ${{ github.event.inputs.issue_number }}
          ISSUE_NUMBER_EVENT: ${{ github.event.issue.number }}
          PR_NUMBER_REVIEW: ${{ github.event.pull_request.number }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request_review" ]; then
            # Triggered by a review requesting changes on a feat/auto- PR
            PR_NUMBER="$PR_NUMBER_REVIEW"
            PR_BODY=$(gh pr view "$PR_NUMBER" --json body --jq '.body // ""')
            LINKED_ISSUE=$(echo "$PR_BODY" | grep -oE '#[0-9]+' | head -1 | tr -d '#')
            if [ -n "$LINKED_ISSUE" ]; then
              ISSUE_NUMBER="$LINKED_ISSUE"
              gh issue view "$ISSUE_NUMBER" --json body --jq '.body' > /tmp/prompt.txt 2>/dev/null || echo "" > /tmp/prompt.txt
              gh issue view "$ISSUE_NUMBER" --json title --jq '.title' > /tmp/issue-title.txt 2>/dev/null || echo "Fix PR #$PR_NUMBER" > /tmp/issue-title.txt
            else
              ISSUE_NUMBER="$PR_NUMBER"
              echo "" > /tmp/prompt.txt
              echo "Fix PR #$PR_NUMBER" > /tmp/issue-title.txt
            fi
            echo "ISSUE_NUMBER=$ISSUE_NUMBER" >> "$GITHUB_ENV"
            echo "Triggered by review on PR #$PR_NUMBER (linked issue: #$LINKED_ISSUE)"
            exit 0
          fi

          ISSUE_NUMBER="$ISSUE_NUMBER_EVENT"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ISSUE_NUMBER="$ISSUE_NUMBER_INPUT"
          fi

          if [ -z "$ISSUE_NUMBER" ]; then
            echo "Issue number is required."
            exit 1
          fi

          gh issue view "$ISSUE_NUMBER" --json body --jq '.body' > /tmp/prompt.txt
          gh issue view "$ISSUE_NUMBER" --json title --jq '.title' > /tmp/issue-title.txt
          echo "ISSUE_NUMBER=$ISSUE_NUMBER" >> "$GITHUB_ENV"

      - name: Create branch
        run: |
          # Ensure we have the latest master
          git fetch origin master
          git checkout master
          git pull origin master
          
          BRANCH="feat/auto-$ISSUE_NUMBER"
          if git ls-remote --exit-code origin "refs/heads/$BRANCH" 2>/dev/null; then
            echo "Branch $BRANCH already exists on remote — checking out"
            git fetch origin "$BRANCH"
            git checkout -b "$BRANCH" "origin/$BRANCH"
            git rebase origin/master || { git rebase --abort; echo "Rebase aborted — using existing branch as-is"; }
          else
            git checkout -b "$BRANCH" master
          fi
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Verify rebase integrity
        run: |
          echo "🔍 Checking for merge conflict markers..."
          if grep -rnP '^<<<<<<< |^=======$|^>>>>>>> ' --include='*.ts' --include='*.tsx' --include='*.json' src/; then
            echo "❌ Merge conflict markers found after rebase — aborting to prevent corrupted push"
            exit 1
          fi
          echo "✅ No conflict markers found"

          echo "🔍 Checking TypeScript compilation..."
          if ! npx tsc --noEmit; then
            echo "❌ TypeScript errors detected after rebase — merge auto may have corrupted files"
            exit 1
          fi
          echo "✅ TypeScript compilation clean"

      - name: Check for existing PR
        id: check_pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || true)
          echo "EXISTING_PR=$EXISTING_PR" >> "$GITHUB_ENV"
          echo "existing_pr=$EXISTING_PR" >> "$GITHUB_OUTPUT"

      - name: Check if existing PR already has clean CI
        id: check_pr_ci
        if: steps.check_pr.outputs.existing_pr != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ steps.check_pr.outputs.existing_pr }}"
          # Count passing/neutral checks vs failing/pending
          CHECKS=$(gh pr view "$PR_NUMBER" --json statusCheckRollup --jq '
            [.statusCheckRollup[]? | select(.status? == "COMPLETED") | select(.conclusion? == "SUCCESS" or .conclusion? == "NEUTRAL")] | length
          ' 2>/dev/null || echo "0")
          TOTAL=$(gh pr view "$PR_NUMBER" --json statusCheckRollup --jq '
            [.statusCheckRollup[]? | select(.status? == "COMPLETED")] | length
          ' 2>/dev/null || echo "0")
          echo "PR #$PR_NUMBER: $CHECKS/$TOTAL checks passing"

          if [ "$TOTAL" -gt 0 ] && [ "$CHECKS" -eq "$TOTAL" ]; then
            echo "✅ All CI checks green — no dev fix needed, skip to reviewer trigger"
            echo "SKIP_DEV_AGENT=true" >> "$GITHUB_ENV"
          else
            echo "⚠ Some checks failing or pending — dev agent will attempt fix"
            echo "SKIP_DEV_AGENT=false" >> "$GITHUB_ENV"
          fi

      - name: Create campaign label for this issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label get "campaign-$ISSUE_NUMBER" 2>/dev/null || \
            gh label create "campaign-$ISSUE_NUMBER" --color "fbca04" --description "Campaign parent: #$ISSUE_NUMBER" 2>/dev/null || true
          echo "✓ campaign-$ISSUE_NUMBER label ready"

      - name: Mark issue scan start
        run: echo "SCAN_START=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Run Supervisor agent
        if: github.event.inputs.mode == 'supervisor'
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "🔍 Supervisor mode — validating campaign for issue #$ISSUE_NUMBER..."
          PROMPT="Tu es le superviseur de campagne. Valide la campagne #$ISSUE_NUMBER et mets à jour la documentation.

          ## Issue #$ISSUE_NUMBER
          Titre: $(gh issue view "$ISSUE_NUMBER" --json title --jq '.title // ""')
          Body: $(gh issue view "$ISSUE_NUMBER" --json body --jq '.body // ""')
          
          ## Instructions
          1. Vérifie que toutes les sous-issues (label campaign-$ISSUE_NUMBER) sont fermées
          2. Trouve les PRs associées à chaque sous-issue
          3. Exécute les tests de validation (npm run lint && npm test && npm run build)
          4. Met à jour les notes de patch dans src/data/updateNotes.ts :
             - Lis le dernier numéro de version (ex: 3.3.0) et incrémente (devient 3.4.0)
             - Ajoute une nouvelle entrée EN HAUT du tableau UPDATE_NOTES
             - Utilise la date du jour (date +%Y-%m-%d)
             - Résume les changements à partir des titres et descriptions des PRs mergées
             - Chaque changement est une ligne de texte lisible par un joueur
          5. Met à jour README.md si la feature ajoute une capacité joueur notable :
             - Lis la section '## Features'
             - Ajoute une ligne décrivant la nouvelle feature dans la liste
          6. N'oublie PAS le fichier de test src/test/unit/updateNotes.test.ts si la structure change
           7. Commit les changements:
              git add src/data/updateNotes.ts README.md src/test/unit/updateNotes.test.ts
              git commit -m \"docs: add vX.Y.Z patch notes for campaign #$ISSUE_NUMBER\" || true
              git push origin HEAD:docs/campaign-$ISSUE_NUMBER
           8. Crée une PR depuis docs/campaign-$ISSUE_NUMBER vers master:
              gh pr create --title \"docs: vX.Y.Z patch notes for campaign #$ISSUE_NUMBER\" \\
                --body \"Documentation mise à jour pour la campagne #$ISSUE_NUMBER\" \\
                --base master --head docs/campaign-$ISSUE_NUMBER
           9. Poste un rapport récapitulatif sur l'issue #$ISSUE_NUMBER
           10. Ferme l'issue #$ISSUE_NUMBER si tout est OK
          
          Tu es superviseur + documentaliste. Tu DOIS modifier les fichiers de documentation et les committer."
          
          opencode run --dangerously-skip-permissions --agent supervisor --model "opencode/deepseek-v4-flash-free" "$PROMPT"
          echo "✅ Supervisor agent completed"

      - name: Run Orchestrator agent (for proposals / complex issues)
        if: github.event.inputs.mode != 'supervisor' && steps.check_pr.outputs.existing_pr == ''
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ env.ISSUE_NUMBER }}
        run: |
          ISSUE_BODY=$(cat /tmp/prompt.txt)
          ISSUE_TITLE=$(cat /tmp/issue-title.txt)
          ISSUE_LABELS=$(gh issue view "$ISSUE_NUMBER" --json labels --jq '[.[].name] | join(",")' 2>/dev/null || echo "")

          IS_PROPOSAL=false
          IS_COMPLEX=false

          # /proposal trigger
          if echo "$ISSUE_BODY" | grep -qiE '(^|[[:space:]])/proposal($|[[:space:]])'; then
            IS_PROPOSAL=true
          fi

          # proposition label → orchestrator
          if echo "$ISSUE_LABELS" | grep -qiE '(^|,)proposition(,|$)'; then
            IS_PROPOSAL=true
          fi

          # Keywords signaling complexity
          if echo "$ISSUE_TITLE $ISSUE_BODY" | grep -qiE '(Phase|Effort:\s*[4-9]|Effort:\s*[1-9][0-9])'; then
            IS_COMPLEX=true
          fi

          # sub-issue → skip orchestrator (already decomposed)
          if echo "$ISSUE_LABELS" | grep -qiE '(^|,)sub-issue(,|$)'; then
            echo "✓ Sub-issue #$ISSUE_NUMBER — skipping orchestrator, proceeding with dev agent"
            echo "ORCHESTRATOR_SKIP=true" >> "$GITHUB_ENV"
            exit 0
          fi

          # Already a campaign with open sub-issues → orchestrator just tracks progress
          EXISTING_SUBS=$(gh issue list --label "campaign-$ISSUE_NUMBER" --state open --json number --jq 'length' 2>/dev/null || echo 0)
          if [ "$EXISTING_SUBS" -gt 0 ] && [ "$IS_PROPOSAL" = false ] && [ "$IS_COMPLEX" = false ]; then
            echo "✓ Campaign #$ISSUE_NUMBER already has $EXISTING_SUBS sub-issues — skipping orchestrator"
            echo "ORCHESTRATOR_SKIP=true" >> "$GITHUB_ENV"
            exit 0
          fi

          if [ "$IS_PROPOSAL" = true ] || [ "$IS_COMPLEX" = true ]; then
            echo "🔍 Orchestrating complex issue #$ISSUE_NUMBER..."
            echo "ORCHESTRATOR_SKIP=false" >> "$GITHUB_ENV"

            PROMPT="
            Tu es l'orchestrator agent de Bitbrawler.
            Analyse l'issue suivante et décompose-la en sous-issues.

            ## Issue #${ISSUE_NUMBER}
            Titre: ${ISSUE_TITLE}
            Body: ${ISSUE_BODY}
            Labels: ${ISSUE_LABELS}

            ## Contraintes
            - Chaque sous-issue = 1-2 fichiers max
            - Chaque body contient /oc
            - Chaque body mentionne 'depends-on: #N' quand dépendant
            - Utilise gh issue create avec --label campaign-${ISSUE_NUMBER},sub-issue
            - Ne code RIEN, planifie seulement

            ## Création des sous-issues avec gh
            gh issue create --title \"feat: ...\" \\
              --label \"campaign-${ISSUE_NUMBER}\" \\
              --label \"sub-issue\" \\
              --body 'Description... /oc\ndepends-on: #N' \\
              --repo \"\${{ github.repository }}\"
            "

            opencode run --dangerously-skip-permissions --agent orchestrator --model "opencode/deepseek-v4-flash-free" "$PROMPT"
            echo "✅ Orchestrator completed — sub-issues created"

            # Dispatch each new sub-issue with /oc
            gh api "repos/\${{ github.repository }}/issues?state=open&labels=campaign-${ISSUE_NUMBER},sub-issue&sort=created&direction=desc" \
              --jq '.[] | select(.pull_request | not) | .number' 2>/dev/null | while read -r SUB; do
                gh workflow run opencode.yml -f issue_number="$SUB" --repo "\${{ github.repository }}"
                echo "✓ Dispatched sub-issue #$SUB"
                sleep 2
              done

            # Prevent normal Implement step from running
            echo "ORCHESTRATOR_DID_RUN=true" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "ℹ Issue #$ISSUE_NUMBER is simple — proceeding with dev agent"
          echo "ORCHESTRATOR_SKIP=true" >> "$GITHUB_ENV"

      - name: Implement (new PR)
        if: github.event.inputs.mode != 'supervisor' && steps.check_pr.outputs.existing_pr == '' && env.ORCHESTRATOR_DID_RUN != 'true'
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ env.ISSUE_NUMBER }}
        run: |
          ISSUE_BODY=$(cat /tmp/prompt.txt)
          ISSUE_TITLE=$(cat /tmp/issue-title.txt)

          PROMPT="
          Tu es le dev agent de Bitbrawler.

          ## Issue #${ISSUE_NUMBER}
          Titre: ${ISSUE_TITLE}
          Description: ${ISSUE_BODY}

          ## Règles
          - Écris du code clean, testé, sans commentaires
          - Exécute les tests (npm test) et le build (npm run build)
          - Ne modifie PAS .github/workflows/*.yml

           ## Mémoire des sessions précédentes
           Consulte ta mémoire individuelle et la mémoire commune avant de coder :
           Mémoire DEV : $(cat .opencode/memory/dev.json 2>/dev/null || echo "{}")
           Mémoire commune : $(cat .opencode/memory/shared.json 2>/dev/null || echo "{}")

           ## Feature complexe ? Crée une campagne
          Si le changement demandé nécessite PLUSIEURS étapes ou fichiers (ex: nouvelle fonctionnalité complète) :
          1. Découpe en sous-tâches (issues GitHub) via gh issue create
          2. Chaque sous-tâche DOIT contenir /oc dans son body pour être auto-dispatchée
          3. Ajoute le label campaign-${ISSUE_NUMBER} à chaque sous-tâche
          4. Ne code QUE ce qui peut être fait en un seul bloc logique
          5. Le reste sera traité automatiquement via les sous-issues

          Exemple de sous-issue :
          gh issue create \\
            --title \"feat: ajouter le système de quêtes quotidiennes - base de données\" \\
            --label \"campaign-${ISSUE_NUMBER}\" \\
            --body 'Créer les tables Supabase pour les quêtes quotidiennes... /oc'

          ## Instructions techniques
          - N'ajoute PAS de commentaires dans le code
          - N'utilise PAS le type 'any'
          - Suis les conventions du projet (fichiers voisins, structure existante)
          "

          MODELS=(
            "opencode/deepseek-v4-flash-free"
          )
          SUCCESS=0
          for MODEL in "${MODELS[@]}"; do
            echo "Trying model: $MODEL"
            if opencode run --dangerously-skip-permissions --model "$MODEL" "$PROMPT"; then
              echo "Model selected: $MODEL"
              SUCCESS=1
              break
            fi
            echo "Model failed: $MODEL"
          done
          if [ "$SUCCESS" -ne 1 ]; then
            echo "All model attempts failed."
            exit 1
          fi

      - name: Skip dev — existing PR already clean, auto-merge inline
        if: github.event.inputs.mode != 'supervisor' && steps.check_pr.outputs.existing_pr != '' && env.SKIP_DEV_AGENT == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ steps.check_pr.outputs.existing_pr }}"
          ISSUE_NUMBER="${{ env.ISSUE_NUMBER }}"
          echo "✅ PR #$PR_NUMBER already has all CI green — auto-merging via inline reviewer"

          # --- DAG dependency check ---
          DEPS=$(gh issue view "$ISSUE_NUMBER" --json body --jq '.body' 2>/dev/null | grep -oiE 'depends-on:\s*#[0-9]+([,\s]*#[0-9]+)*' | grep -oE '#[0-9]+' | tr -d '#' || echo "")
          if [ -n "$DEPS" ]; then
            ALL_RESOLVED=true
            for DEP in $DEPS; do
              DEP_STATE=$(gh issue view "$DEP" --json state --jq '.state' 2>/dev/null || echo "OPEN")
              if [ "$DEP_STATE" != "CLOSED" ]; then
                echo "⛔ Dependency #$DEP still open — blocking merge"
                ALL_RESOLVED=false
                break
              fi
            done
            if [ "$ALL_RESOLVED" = false ]; then
              echo "⏳ Dependencies not resolved — skipping merge"
              gh pr comment "$PR_NUMBER" --body "⏳ **En attente de dépendances** — merge automatique quand toutes les dépendances seront fermées."
              exit 0
            fi
            echo "✅ All dependencies resolved"
          fi

          # --- Check CI status ---
          CHECKS=$(gh pr view "$PR_NUMBER" --json statusCheckRollup --jq '
            [.statusCheckRollup[]? | select(.status? == "COMPLETED") | select(.conclusion? == "SUCCESS" or .conclusion? == "NEUTRAL")] | length
          ' 2>/dev/null || echo "0")
          TOTAL=$(gh pr view "$PR_NUMBER" --json statusCheckRollup --jq '
            [.statusCheckRollup[]? | select(.status? == "COMPLETED")] | length
          ' 2>/dev/null || echo "0")

          if [ "$TOTAL" -gt 0 ] && [ "$CHECKS" -ne "$TOTAL" ]; then
            echo "❌ CI checks failing ($CHECKS/$TOTAL) — not merging"
            exit 0
          fi

          # --- SQL migration check (exclude workflow/config files) ---
          PR_DIFF=$(gh pr diff "$PR_NUMBER" 2>/dev/null || echo "")
          SQL_CONTENT=$(echo "$PR_DIFF" | awk '/^diff --git/{f=0} /^diff --git.*\.(ts|tsx|sql)$/{f=1} f' | grep -qiE '(ALTER TABLE|CREATE TABLE|DROP TABLE|CREATE INDEX|ALTER COLUMN)' && echo "yes" || echo "")
          if [ -n "$SQL_CONTENT" ]; then
            echo "⛔ SQL migration detected — not merging"
            gh pr comment "$PR_NUMBER" --body "⛔ Migration SQL détectée — merge bloqué. Crée une issue de migration."
            exit 0
          fi

          # --- Approve & merge ---
          echo "✅ All checks passed — merging PR #$PR_NUMBER"

          # If PR has merge conflicts, rebase it first
          MERGEABLE=$(gh pr view "$PR_NUMBER" --json mergeable --jq '.mergeable' 2>/dev/null || echo "")
          if [ "$MERGEABLE" = "CONFLICTING" ]; then
            echo "⚠ PR has merge conflicts — attempting rebase..."
            gh pr checkout "$PR_NUMBER" 2>/dev/null || git fetch origin "refs/pull/$PR_NUMBER/head:pr-$PR_NUMBER" && git checkout "pr-$PR_NUMBER"
            git rebase origin/master || { echo "Rebase failed, cannot merge"; exit 1; }
            git push origin HEAD:"$(gh pr view "$PR_NUMBER" --json headRefName --jq '.headRefName' 2>/dev/null)" --force-with-lease
            sleep 5
          fi

          IS_BOT=$(gh pr view "$PR_NUMBER" --json author --jq '.author.is_bot // false' 2>/dev/null || echo "false")
          if [ "$IS_BOT" = "true" ]; then
            echo "ℹ Auto-authored PR — merging directly (skip approval)"
          else
            gh pr review --approve "$PR_NUMBER" --body "✅ Revue automatique: CI verte, dépendances résolues, pas de migration SQL."
          fi
          gh pr merge "$PR_NUMBER" --squash --delete-branch || { echo "Merge still failing — check manually"; exit 1; }
          echo "✓ PR #$PR_NUMBER merged"

          # --- Post-merge: re-trigger dependant PRs ---
          echo "🔍 Looking for PRs that depend on #$ISSUE_NUMBER..."
          DEPENDANT_ISSUES=$(gh issue list --state open --json number,body --jq '
            .[] | select(.body | test("depends-on:\\s*(#[0-9]+[,\\s]*)*#'"$ISSUE_NUMBER"'", "i")) | .number
          ' 2>/dev/null || echo "")
          for DEP_ISSUE in $DEPENDANT_ISSUES; do
            DEP_PR=$(gh pr list --state open --head "feat/auto-$DEP_ISSUE" --json number --jq '.[0].number' 2>/dev/null || echo "")
            if [ -n "$DEP_PR" ]; then
              echo "🔄 Re-dispatching opencode.yml for PR #$DEP_PR (issue #$DEP_ISSUE)"
              gh workflow run opencode.yml -f issue_number="$DEP_ISSUE" --repo "${{ github.repository }}"
              sleep 3
            fi
          done

      - name: Implement (fix existing PR)
        if: github.event.inputs.mode != 'supervisor' && steps.check_pr.outputs.existing_pr != '' && env.SKIP_DEV_AGENT != 'true'
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ steps.check_pr.outputs.existing_pr }}"
          echo "Existing PR #$PR_NUMBER — fetching CI/review feedback..."

          # Get PR diff, comments, reviews, and CI check results
          PR_DIFF=$(gh pr diff "$PR_NUMBER" 2>/dev/null || echo "")
          PR_COMMENTS=$(gh api "/repos/${{ github.repository }}/issues/$PR_NUMBER/comments" --jq '.[].body' 2>/dev/null || echo "")
          PR_REVIEWS=$(gh api "/repos/${{ github.repository }}/pulls/$PR_NUMBER/reviews" --jq '.[].body' 2>/dev/null || echo "")
          CI_CHECKS=$(gh pr view "$PR_NUMBER" --json statusCheckRollup --jq '
            [.statusCheckRollup[]? | select(.conclusion? == "FAILURE" or .conclusion? == "ACTION_REQUIRED") |
              {name: .name, conclusion: .conclusion}
            ]' 2>/dev/null || echo "")

          # Get original issue
          ISSUE_TITLE=$(cat /tmp/issue-title.txt)
          ISSUE_BODY=$(cat /tmp/prompt.txt)

          PROMPT="
          Tu dois CORRIGER la PR #$PR_NUMBER. La CI a échoué ou le reviewer a demandé des changements.

          ## Issue originale #$ISSUE_NUMBER
          Titre: $ISSUE_TITLE
          Description: $ISSUE_BODY

          ## État actuel de la PR
          \`\`\`diff
          $PR_DIFF
          \`\`\`

          ## Commentaires sur la PR
          $PR_COMMENTS

          ## Reviews demandant des changements
          $PR_REVIEWS

          ## Checks CI en échec
          $CI_CHECKS

          ## Contexte du système de mémoire
          Consulte ta mémoire individuelle et la mémoire commune avant de coder :
          $(cat .opencode/memory/dev.json 2>/dev/null || echo "Pas de mémoire individuelle")
          $(cat .opencode/memory/shared.json 2>/dev/null || echo "Pas de mémoire commune")

          ## Instructions
          1. Analyse les retours CI et les commentaires de review
          2. Corrige les problèmes identifiés
          3. Les tests doivent passer (npm test)
          4. Le build doit passer (npm run build)
          5. N'ajoute pas de commentaires dans le code
          "

          MODELS=(
            "opencode/deepseek-v4-flash-free"
          )
          SUCCESS=0
          for MODEL in "${MODELS[@]}"; do
            echo "Trying model: $MODEL"
            if opencode run --dangerously-skip-permissions --model "$MODEL" "$PROMPT"; then
              echo "Model selected: $MODEL"
              SUCCESS=1
              break
            fi
            echo "Model failed: $MODEL"
          done
          if [ "$SUCCESS" -ne 1 ]; then
            echo "All model attempts failed."
            gh pr comment "$PR_NUMBER" --body "❌ Agent unable to fix issues. Manual intervention required."
            exit 1
          fi

      - name: Validate and retry (lint → test → build — recall agent on failure)
        if: success() && github.event.inputs.mode != 'supervisor'
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          MAX_RETRIES=3
          ISSUE_TITLE=$(cat /tmp/issue-title.txt 2>/dev/null || echo "Auto-implement issue #$ISSUE_NUMBER")
          ISSUE_BODY=$(cat /tmp/prompt.txt 2>/dev/null || echo "Implement the described feature")

          for ATTEMPT in $(seq 0 $MAX_RETRIES); do
            echo "========== Validation attempt $((ATTEMPT+1))/$((MAX_RETRIES+1)) =========="

            # Lint (auto-fix first)
            npm run lint -- --fix 2>/dev/null || true
            npm run lint > /tmp/lint_out.txt 2>&1 && LINT_OK=true || LINT_OK=false

            # TypeScript check
            npx tsc --noEmit > /tmp/tsc_out.txt 2>&1 && TSC_OK=true || TSC_OK=false

            # Tests
            npm test > /tmp/test_out.txt 2>&1 && TEST_OK=true || TEST_OK=false

            # Build
            npm run build > /tmp/build_out.txt 2>&1 && BUILD_OK=true || BUILD_OK=false

            # Print results
            [ "$LINT_OK" = true ] && echo "✅ Lint passed" || echo "❌ Lint failed"
            [ "$TSC_OK" = true ] && echo "✅ TypeScript check passed" || echo "❌ TypeScript check failed"
            [ "$TEST_OK" = true ] && echo "✅ Tests passed" || echo "❌ Tests failed"
            [ "$BUILD_OK" = true ] && echo "✅ Build passed" || echo "❌ Build failed"

            if [ "$LINT_OK" = true ] && [ "$TSC_OK" = true ] && [ "$TEST_OK" = true ] && [ "$BUILD_OK" = true ]; then
              echo "✅ All checks passed!"
              exit 0
            fi

            if [ "$ATTEMPT" -ge "$MAX_RETRIES" ]; then
              echo "❌ Validation failed after $((MAX_RETRIES+1)) attempts — giving up"
              cat /tmp/lint_out.txt
              cat /tmp/tsc_out.txt
              cat /tmp/test_out.txt
              cat /tmp/build_out.txt
              exit 1
            fi

            echo "❌ Validation failed — recalling agent to fix (retry $((ATTEMPT+2))/$((MAX_RETRIES+1)))..."

            # Build prompt from temp files to avoid YAML multi-line parse issues
            echo "Corrige les erreurs dans le code pour que tous les checks passent.
            
            Issue ##$ISSUE_NUMBER
            Titre: $ISSUE_TITLE
            Description: $ISSUE_BODY
            " > /tmp/fix_prompt.txt

            if [ "$LINT_OK" != true ]; then
              echo "### ❌ Lint errors" >> /tmp/fix_prompt.txt
              cat /tmp/lint_out.txt >> /tmp/fix_prompt.txt
              echo "" >> /tmp/fix_prompt.txt
            fi
            if [ "$TSC_OK" != true ]; then
              echo "### ❌ TypeScript errors" >> /tmp/fix_prompt.txt
              cat /tmp/tsc_out.txt >> /tmp/fix_prompt.txt
              echo "" >> /tmp/fix_prompt.txt
            fi
            if [ "$TEST_OK" != true ]; then
              echo "### ❌ Test failures" >> /tmp/fix_prompt.txt
              cat /tmp/test_out.txt >> /tmp/fix_prompt.txt
              echo "" >> /tmp/fix_prompt.txt
            fi
            if [ "$BUILD_OK" != true ]; then
              echo "### ❌ Build errors" >> /tmp/fix_prompt.txt
              cat /tmp/build_out.txt >> /tmp/fix_prompt.txt
              echo "" >> /tmp/fix_prompt.txt
            fi

            {
              echo "## Règles"
              echo "- Ne modifie que le nécessaire pour corriger les erreurs"
              echo "- N'ajoute PAS de commentaires dans le code"
              echo "- Ne touche PAS à .github/workflows/*.yml"
              echo "- Exécute les corrections puis exécute la validation complète"
            } >> /tmp/fix_prompt.txt

            FIX_PROMPT=$(cat /tmp/fix_prompt.txt)

            echo "--- Agent fix prompt ---"
            echo "$FIX_PROMPT" | head -50
            echo "---"

            opencode run --dangerously-skip-permissions --model "opencode/deepseek-v4-flash-free" "$FIX_PROMPT"
          done

      - name: Save agent session memory
        if: success() && github.event.inputs.mode != 'supervisor'
        run: |
          if [ -f /tmp/agent-session-notes.json ]; then
            NOTES=$(cat /tmp/agent-session-notes.json)
            CURRENT=$(cat .opencode/memory/dev.json 2>/dev/null || echo '{}')
            UPDATED=$(echo "$CURRENT" | jq --argjson notes "$NOTES" --arg date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" '
              .last_session = $date | .session_notes += [$notes]
            ')
            echo "$UPDATED" > .opencode/memory/dev.json
            git add .opencode/memory/dev.json && git commit -m "chore: update dev memory [skip ci]" || true
            echo "✅ Dev memory updated"
          else
            echo "ℹ No session notes found"
          fi

      - name: Push and manage PR
        id: pr_create
        if: success() && github.event.inputs.mode != 'supervisor'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git add -A
          # Detect and reject any .github/workflows/ changes — agent must never touch these
          if git diff --cached --name-only | grep -q '^\.github/workflows/'; then
            echo "⛔ Agent attempted to modify .github/workflows/ files — stripping them from commit"
            git restore --staged .github/workflows/
            git checkout -- .github/workflows/ 2>/dev/null || true
            git add -A
          fi
          if git diff --cached --quiet; then
            echo "No unstaged changes. Checking for unpushed commits..."
            # Count commits ahead of remote branch (handles both existing and new branches)
            COMMITS=$(git log --oneline "origin/${BRANCH}..HEAD" 2>/dev/null | wc -l)
            if [ "$COMMITS" -eq 0 ]; then
              if git ls-remote --exit-code origin "refs/heads/${BRANCH}" >/dev/null 2>&1; then
                echo "Branch exists on remote but no new commits locally — checking for existing PR..."
                EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || true)
                if [ -n "$EXISTING_PR" ]; then
                  echo "Found existing PR #$EXISTING_PR — skipping creation"
                  echo "PR_NUMBER=$EXISTING_PR" >> $GITHUB_OUTPUT
                  exit 0
                fi
                echo "No PR exists — will create from existing remote branch"
              else
                # New branch — count commits since branching from master
                COMMITS=$(git log --oneline origin/master..HEAD 2>/dev/null | wc -l)
                if [ "$COMMITS" -eq 0 ]; then
                  echo "No commits found — no changes to push"
                  echo "PR_NUMBER=" >> $GITHUB_OUTPUT
                  exit 0
                fi
                echo "Found unpushed commits — pushing (new branch)"
              fi
            else
              echo "Found unpushed commits — pushing"
            fi
          else
            git commit -m "feat: auto-implement #$ISSUE_NUMBER"
          fi
          git push origin "$BRANCH" -f

          gh label get auto-generated 2>/dev/null && LABEL_FLAG="--label auto-generated" || LABEL_FLAG=""

          PR_NUMBER="${{ steps.check_pr.outputs.existing_pr }}"
          if [ -n "$PR_NUMBER" ]; then
            echo "Updating existing PR #$PR_NUMBER — new changes pushed"
            gh pr edit "$PR_NUMBER" \
              --title "$(cat /tmp/issue-title.txt)" \
              --body "Closes #$ISSUE_NUMBER" \
              $LABEL_FLAG
            gh pr merge --auto --squash "$PR_NUMBER" 2>/dev/null || true
            PR_URL="https://github.com/${{ github.repository }}/pull/$PR_NUMBER"
          else
            PR_URL=$(gh pr create \
              --title "$(cat /tmp/issue-title.txt)" \
              --body "Closes #$ISSUE_NUMBER" \
              --base master \
              $LABEL_FLAG)
            PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$' || true)
            gh pr merge --auto --squash "$PR_NUMBER" 2>/dev/null || true
          fi
          echo "PR_NUMBER=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "✓ PR #$PR_NUMBER: $PR_URL"

      - name: Dispatch newly created /oc issues
        if: success() && github.event.inputs.mode != 'supervisor'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "🔍 Scanning for new issues with /oc created by agent..."
          ISSUES_FILE=/tmp/opencode-fresh-issues.txt

          gh api "repos/${GITHUB_REPOSITORY}/issues?state=open&sort=created&direction=desc&per_page=100&since=${SCAN_START}" \
            --jq '.[] | select(.pull_request | not) | @base64' > "$ISSUES_FILE"

          FOUND=0
          while IFS= read -r row; do
            [ -z "$row" ] && continue

            json=$(printf '%s' "$row" | base64 --decode)
            number=$(echo "$json" | jq -r '.number')
            body=$(echo "$json" | jq -r '.body // ""')

            # Skip the current issue (prevent re-dispatch loop)
            [ "$number" = "$ISSUE_NUMBER" ] && continue

            # Only dispatch if body contains /oc, /opencode, or /proposal
            if ! printf '%s' "$body" | grep -qiE '(^|[[:space:]])/(oc|opencode|proposal)($|[[:space:]])'; then
              continue
            fi

            # Mark as dispatched and trigger workflow
            echo "Dispatching issue #$number..."
            gh issue edit "$number" --add-label dispatched 2>/dev/null || true
            gh workflow run opencode.yml -f issue_number="$number" --repo "${{ github.repository }}"
            echo "✓ Dispatched #$number"
            FOUND=1
            sleep 2
          done < "$ISSUES_FILE"

          if [ "$FOUND" -eq 0 ]; then
            echo "ℹ No new /oc issues found since scan start"
          fi

      # CI et Reviewer sont déclenchés automatiquement par les events GitHub :
      # - pull_request [opened, synchronize] → CI (ci.yml)
      # - CI success → reviewer dispatché par ci.yml
      # Pas besoin de dispatch manuel ici.
