name: OpenCode Agent

on:
  issues:
    types: [opened]

jobs:
  implement:
    if: contains(github.event.issue.body, '/oc') || contains(github.event.issue.body, '/opencode')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anomalyco/opencode/github@v1.15.10
        env:
          GITHUB_TOKEN: ${{ github.token }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: opencode/deepseek-v4-flash-free
