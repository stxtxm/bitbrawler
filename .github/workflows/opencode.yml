name: OpenCode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  opencode:
    if: |
      github.event_name == 'issue_comment' &&
      (contains(github.event.comment.body, '/oc') || contains(github.event.comment.body, '/opencode'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
      checks: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: anomalyco/opencode/github@latest
        with:
          model: opencode/deepseek-v4-flash-free
          agent: dev-agent

  review:
    if: |
      github.event_name == 'pull_request' &&
      (github.event.action == 'opened' || github.event.action == 'synchronize' || github.event.action == 'ready_for_review') &&
      github.event.pull_request.user.type == 'Bot'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      checks: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1
          persist-credentials: false

      - uses: anomalyco/opencode/github@latest
        with:
          model: opencode/deepseek-v4-flash-free
          agent: reviewer
          prompt: |
            Review this pull request for Bitbrawler:
            - Run npm test to verify tests pass
            - Run npx tsc --noEmit to check TypeScript
            - Check for code quality issues
            - If everything passes and quality is good:
              1. Approve the PR
              2. Merge with squash (gh pr merge --squash --auto)
              3. Delete the branch
