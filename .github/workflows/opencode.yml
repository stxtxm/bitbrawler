name: OpenCode Agent

on:
  issues:
    types: [opened]

jobs:
  implement:
    if: contains(github.event.issue.body, '/oc') || contains(github.event.issue.body, '/opencode')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install opencode
        run: npm install -g opencode-ai

      - name: Configure git
        run: |
          git config user.name "opencode-agent"
          git config user.email "agent@opencode.ai"

      - name: Create branch
        run: |
          BRANCH="feat/auto-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Implement
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          PROMPT=$(echo '${{ github.event.issue.body }}' | sed 's|/oc||g; s|/opencode||g' | xargs)
          opencode run --dangerously-skip-permissions --model "opencode/deepseek-v4-flash-free" "$PROMPT"

      - name: Push and create PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git add -A
          git diff --cached --quiet || git commit -m "feat: auto-implement #${{ github.event.issue.number }}"
          git push origin "$BRANCH" -f
          gh label get auto-generated 2>/dev/null && LABEL_FLAG="--label auto-generated" || LABEL_FLAG=""
          gh pr create \
            --title "${{ github.event.issue.title }}" \
            --body "Closes #${{ github.event.issue.number }}" \
            --base master \
            $LABEL_FLAG || true
