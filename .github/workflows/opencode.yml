name: OpenCode Agent

on:
  issues:
    types: [opened, edited]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to implement
        required: true
        type: string

jobs:
  implement:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'issues' &&
        (
          contains(github.event.issue.body, '/oc') ||
          contains(github.event.issue.body, '/opencode')
        )
      ) ||
      (
        github.event_name == 'pull_request_review' &&
        github.event.review.state == 'changes_requested' &&
        startsWith(github.event.pull_request.head.ref, 'feat/auto-')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: write
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install opencode
        run: npm install -g opencode-ai

      - name: Install dependencies
        run: npm ci

      - name: Configure git
        run: |
          git config user.name "opencode-agent"
          git config user.email "agent@opencode.ai"

      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for LABEL in auto-generated dispatched; do
            gh label get "$LABEL" 2>/dev/null || \
              gh label create "$LABEL" --color "grey" --description "Auto-managed by OpenCode agent" 2>/dev/null || true
          done

      - name: Resolve issue context
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER_INPUT: ${{ github.event.inputs.issue_number }}
          ISSUE_NUMBER_EVENT: ${{ github.event.issue.number }}
          PR_NUMBER_REVIEW: ${{ github.event.pull_request.number }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request_review" ]; then
            # Triggered by a review requesting changes on a feat/auto- PR
            PR_NUMBER="$PR_NUMBER_REVIEW"
            PR_BODY=$(gh pr view "$PR_NUMBER" --json body --jq '.body // ""')
            LINKED_ISSUE=$(echo "$PR_BODY" | grep -oE '#[0-9]+' | head -1 | tr -d '#')
            if [ -n "$LINKED_ISSUE" ]; then
              ISSUE_NUMBER="$LINKED_ISSUE"
              gh issue view "$ISSUE_NUMBER" --json body --jq '.body' > /tmp/prompt.txt 2>/dev/null || echo "" > /tmp/prompt.txt
              gh issue view "$ISSUE_NUMBER" --json title --jq '.title' > /tmp/issue-title.txt 2>/dev/null || echo "Fix PR #$PR_NUMBER" > /tmp/issue-title.txt
            else
              ISSUE_NUMBER="$PR_NUMBER"
              echo "" > /tmp/prompt.txt
              echo "Fix PR #$PR_NUMBER" > /tmp/issue-title.txt
            fi
            echo "ISSUE_NUMBER=$ISSUE_NUMBER" >> "$GITHUB_ENV"
            echo "Triggered by review on PR #$PR_NUMBER (linked issue: #$LINKED_ISSUE)"
            exit 0
          fi

          ISSUE_NUMBER="$ISSUE_NUMBER_EVENT"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ISSUE_NUMBER="$ISSUE_NUMBER_INPUT"
          fi

          if [ -z "$ISSUE_NUMBER" ]; then
            echo "Issue number is required."
            exit 1
          fi

          gh issue view "$ISSUE_NUMBER" --json body --jq '.body' > /tmp/prompt.txt
          gh issue view "$ISSUE_NUMBER" --json title --jq '.title' > /tmp/issue-title.txt
          echo "ISSUE_NUMBER=$ISSUE_NUMBER" >> "$GITHUB_ENV"

      - name: Create branch
        run: |
          # Ensure we have the latest master
          git fetch origin master
          git checkout master
          git pull origin master
          
          BRANCH="feat/auto-$ISSUE_NUMBER"
          if git ls-remote --exit-code origin "refs/heads/$BRANCH" 2>/dev/null; then
            echo "Branch $BRANCH already exists on remote — checking out"
            git fetch origin "$BRANCH"
            git checkout -b "$BRANCH" "origin/$BRANCH"
            git rebase origin/master || echo "Rebase failed, continuing with existing branch"
          else
            git checkout -b "$BRANCH" master
          fi
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Check for existing PR
        id: check_pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || true)
          echo "EXISTING_PR=$EXISTING_PR" >> "$GITHUB_ENV"
          echo "existing_pr=$EXISTING_PR" >> "$GITHUB_OUTPUT"

      - name: Implement (new PR)
        if: steps.check_pr.outputs.existing_pr == ''
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          PROMPT=$(cat /tmp/prompt.txt | tr -d "'" | xargs)
          
          MODELS=(
            "opencode/deepseek-v4-flash-free"
          )
          SUCCESS=0
          for MODEL in "${MODELS[@]}"; do
            echo "Trying model: $MODEL"
            if opencode run --dangerously-skip-permissions --model "$MODEL" "$PROMPT"; then
              echo "Model selected: $MODEL"
              SUCCESS=1
              break
            fi
            echo "Model failed: $MODEL"
          done
          if [ "$SUCCESS" -ne 1 ]; then
            echo "All model attempts failed."
            exit 1
          fi

      - name: Implement (fix existing PR)
        if: steps.check_pr.outputs.existing_pr != ''
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ steps.check_pr.outputs.existing_pr }}"
          echo "Existing PR #$PR_NUMBER — fetching CI/review feedback..."

          # Get PR diff, comments, reviews, and CI check results
          PR_DIFF=$(gh pr diff "$PR_NUMBER" 2>/dev/null || echo "")
          PR_COMMENTS=$(gh api "/repos/${{ github.repository }}/issues/$PR_NUMBER/comments" --jq '.[].body' 2>/dev/null || echo "")
          PR_REVIEWS=$(gh api "/repos/${{ github.repository }}/pulls/$PR_NUMBER/reviews" --jq '.[].body' 2>/dev/null || echo "")
          CI_CHECKS=$(gh pr view "$PR_NUMBER" --json statusCheckRollup --jq '
            [.statusCheckRollup[]? | select(.conclusion? == "FAILURE" or .conclusion? == "ACTION_REQUIRED") |
              {name: .name, conclusion: .conclusion}
            ]' 2>/dev/null || echo "")

          # Get original issue
          ISSUE_TITLE=$(cat /tmp/issue-title.txt)
          ISSUE_BODY=$(cat /tmp/prompt.txt)

          PROMPT="
          Tu dois CORRIGER la PR #$PR_NUMBER. La CI a échoué ou le reviewer a demandé des changements.

          ## Issue originale #$ISSUE_NUMBER
          Titre: $ISSUE_TITLE
          Description: $ISSUE_BODY

          ## État actuel de la PR
          \`\`\`diff
          $PR_DIFF
          \`\`\`

          ## Commentaires sur la PR
          $PR_COMMENTS

          ## Reviews demandant des changements
          $PR_REVIEWS

          ## Checks CI en échec
          $CI_CHECKS

          ## Instructions
          1. Analyse les retours CI et les commentaires de review
          2. Corrige les problèmes identifiés
          3. Les tests doivent passer (npm test)
          4. Le build doit passer (npm run build)
          5. N'ajoute pas de commentaires dans le code
          "

          MODELS=(
            "opencode/deepseek-v4-flash-free"
          )
          SUCCESS=0
          for MODEL in "${MODELS[@]}"; do
            echo "Trying model: $MODEL"
            if opencode run --dangerously-skip-permissions --model "$MODEL" "$PROMPT"; then
              echo "Model selected: $MODEL"
              SUCCESS=1
              break
            fi
            echo "Model failed: $MODEL"
          done
          if [ "$SUCCESS" -ne 1 ]; then
            echo "All model attempts failed."
            gh pr comment "$PR_NUMBER" --body "❌ Agent unable to fix issues. Manual intervention required."
            exit 1
          fi

      - name: Validate code (lint, test, build)
        run: |
          echo "🔍 Running lint..."
          npm run lint || { echo "❌ Lint failed — agent must fix"; exit 1; }
          echo "✅ Lint passed"
          echo "🔍 Running tests..."
          npm test || { echo "❌ Tests failed — agent must fix"; exit 1; }
          echo "✅ Tests passed"
          echo "🔍 Running build..."
          npm run build || { echo "❌ Build failed — agent must fix"; exit 1; }
          echo "✅ Build passed"

      - name: Push and manage PR
        id: pr_create
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No code changes — skipping PR creation"
            echo "PR_NUMBER=" >> $GITHUB_OUTPUT
            exit 0
          fi
          git commit -m "feat: auto-implement #$ISSUE_NUMBER"
          git push origin "$BRANCH" -f

          gh label get auto-generated 2>/dev/null && LABEL_FLAG="--label auto-generated" || LABEL_FLAG=""

          PR_NUMBER="${{ steps.check_pr.outputs.existing_pr }}"
          if [ -n "$PR_NUMBER" ]; then
            echo "Updating existing PR #$PR_NUMBER — new changes pushed"
            gh pr edit "$PR_NUMBER" \
              --title "$(cat /tmp/issue-title.txt)" \
              --body "Closes #$ISSUE_NUMBER" \
              $LABEL_FLAG
            PR_URL="https://github.com/${{ github.repository }}/pull/$PR_NUMBER"
          else
            PR_URL=$(gh pr create \
              --title "$(cat /tmp/issue-title.txt)" \
              --body "Closes #$ISSUE_NUMBER" \
              --base master \
              $LABEL_FLAG)
            PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$' || true)
          fi
          echo "PR_NUMBER=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "✓ PR #$PR_NUMBER: $PR_URL"

      - name: Dispatch sub-issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "🔍 Checking for sub-issues to dispatch..."
          SUB_ISSUES=$(gh issue list --label auto-generated --state open --json number --jq '.[].number' 2>/dev/null || echo "")
          if [ -z "$SUB_ISSUES" ]; then
            echo "No sub-issues found"
            exit 0
          fi
          for ISSUE in $SUB_ISSUES; do
            HAS_DISPATCHED=$(gh issue view "$ISSUE" --json labels --jq '[.labels[].name] | any(. == "dispatched")' 2>/dev/null || echo "false")
            if [ "$HAS_DISPATCHED" = "true" ]; then
              echo "⏭️  Issue #$ISSUE already dispatched, skipping"
              continue
            fi
            echo "Dispatching sub-issue #$ISSUE..."
            gh issue add-label "$ISSUE" --label dispatched 2>/dev/null || true
            gh workflow run opencode.yml -f issue_number="$ISSUE" --repo "${{ github.repository }}"
            echo "✓ Dispatched #$ISSUE"
            sleep 2
          done

      - name: Trigger CI workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run ci.yml --ref "$BRANCH"

      - name: Trigger Reviewer workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ steps.pr_create.outputs.PR_NUMBER }}" ]; then
            gh workflow run reviewer.yml -f pr_number=${{ steps.pr_create.outputs.PR_NUMBER }}
          else
            echo "Warning: PR_NUMBER is empty, skipping reviewer workflow"
          fi
