name: OpenCode Agent

on:
  issues:
    types: [opened, edited]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to implement
        required: true
        type: string

jobs:
  implement:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'issues' &&
        (
          contains(github.event.issue.body, '/oc') ||
          contains(github.event.issue.body, '/opencode')
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      workflows: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install opencode
        run: npm install -g opencode-ai

      - name: Configure git
        run: |
          git config user.name "opencode-agent"
          git config user.email "agent@opencode.ai"

      - name: Resolve issue context
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER_INPUT: ${{ github.event.inputs.issue_number }}
          ISSUE_NUMBER_EVENT: ${{ github.event.issue.number }}
        run: |
          ISSUE_NUMBER="$ISSUE_NUMBER_EVENT"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ISSUE_NUMBER="$ISSUE_NUMBER_INPUT"
          fi

          if [ -z "$ISSUE_NUMBER" ]; then
            echo "Issue number is required."
            exit 1
          fi

          gh issue view "$ISSUE_NUMBER" --json body --jq '.body' > /tmp/prompt.txt
          gh issue view "$ISSUE_NUMBER" --json title --jq '.title' > /tmp/issue-title.txt
          echo "ISSUE_NUMBER=$ISSUE_NUMBER" >> "$GITHUB_ENV"

      - name: Create branch
        run: |
          BRANCH="feat/auto-$ISSUE_NUMBER"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Implement
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          PROMPT=$(cat /tmp/prompt.txt | tr -d "'" | sed 's|/oc||g; s|/opencode||g' | xargs)
          MODELS=(
            "opencode/deepseek-v4-flash-free"
            "opencode/nemotron"
            "opencode/big-pickle"
          )

          SUCCESS=0
          for MODEL in "${MODELS[@]}"; do
            echo "Trying model: $MODEL"
            if opencode run --dangerously-skip-permissions --model "$MODEL" "$PROMPT"; then
              echo "Model selected: $MODEL"
              SUCCESS=1
              break
            fi
            echo "Model failed: $MODEL"
          done

          if [ "$SUCCESS" -ne 1 ]; then
            echo "All model attempts failed."
            exit 1
          fi

      - name: Push and create PR
        id: pr_create
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git add -A
          git diff --cached --quiet || git commit -m "feat: auto-implement #$ISSUE_NUMBER"
          git push origin "$BRANCH" -f
          gh label get auto-generated 2>/dev/null && LABEL_FLAG="--label auto-generated" || LABEL_FLAG=""
          PR_NUMBER=$(gh pr create \
            --title "$(cat /tmp/issue-title.txt)" \
            --body "Closes #$ISSUE_NUMBER" \
            --base master \
            $LABEL_FLAG --json number --jq '.number' || true)
          echo "PR_NUMBER=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: Trigger CI workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run ci.yml --ref "$BRANCH"

      - name: Trigger Reviewer workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run reviewer.yml -f pr_number="${{ steps.pr_create.outputs.PR_NUMBER }}"
