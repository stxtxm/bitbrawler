name: OpenCode Agent

on:
  issues:
    types: [opened]

jobs:
  implement:
    if: contains(github.event.issue.body, '/oc') || contains(github.event.issue.body, '/opencode')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install opencode CLI
        run: npm install -g opencode-ai

      - name: Configure git
        run: |
          git config user.name "opencode-agent"
          git config user.email "agent@opencode.ai"

      - name: Create feature branch
        run: |
          BRANCH="feat/auto-issue-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Run opencode
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          ISSUE_BODY="${{ github.event.issue.body }}"
          # Remove /oc or /opencode from the prompt
          PROMPT=$(echo "$ISSUE_BODY" | sed 's/\/oc//g; s/\/opencode//g')
          echo "$PROMPT" | opencode run --model "opencode/deepseek-v4-flash-free" --yes

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --title "${{ github.event.issue.title }}" \
            --body "Automated implementation of #${{ github.event.issue.number }}

            Closes #${{ github.event.issue.number }}" \
            --base master
