name: Tech Lead Daily

on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  tech-lead:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 20

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install opencode
        run: npm install -g opencode-ai

      - name: Configure git
        run: |
          git config user.name "opencode-agent"
          git config user.email "agent@opencode.ai"

      - name: Merge at most one safe agent PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          CANDIDATES=$(gh pr list --state open --json number,author,isDraft,mergeStateStatus,labels,createdAt --jq '[.[]
            | .author_login = (.author.login // "")
            | .has_auto_label = ([.labels[]?.name] | index("auto-generated") != null)
            | .is_agent = (.has_auto_label or .author_login == "app/github-actions" or .author_login == "opencode-agent" or (.author_login | test("bot"; "i")))
            | select(.is_agent == true and .isDraft == false)
          ] | sort_by(.createdAt)')

          COUNT=$(echo "$CANDIDATES" | jq 'length')
          if [ "$COUNT" -eq 0 ]; then
            echo "No eligible agent PRs."
            exit 0
          fi

          PR_NUM=$(echo "$CANDIDATES" | jq -r '.[0].number')
          MERGE_STATE=$(gh pr view "$PR_NUM" --json mergeStateStatus --jq '.mergeStateStatus // ""')
          if [ "$MERGE_STATE" != "CLEAN" ] && [ "$MERGE_STATE" != "HAS_HOOKS" ]; then
            echo "PR #$PR_NUM not mergeable now (state=$MERGE_STATE)."
            exit 0
          fi

          BLOCKING=$(gh pr view "$PR_NUM" --json statusCheckRollup --jq '[.statusCheckRollup[]? | select((.status? != "COMPLETED") or (.conclusion? != null and .conclusion != "SUCCESS") or (.state? != null and .state != "SUCCESS"))] | length')
          if [ "$BLOCKING" -ne 0 ]; then
            echo "PR #$PR_NUM has non-green checks."
            exit 0
          fi

          echo "Merging PR #$PR_NUM (safe mode: max 1 per run)..."
          gh pr merge "$PR_NUM" --squash --delete-branch

      - name: Run Tech Lead agent
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          MODELS=(
            "opencode/deepseek-v4-flash-free"
            "opencode/nemotron"
            "opencode/big-pickle"
          )

          PROMPT="Analyse le repo aujourd'hui. Consulte les stats QA (qa/stats.json), regarde les commits récents, puis crée des issues avec /oc pour les améliorations à faire."

          SUCCESS=0
          for MODEL in "${MODELS[@]}"; do
            if opencode run --dangerously-skip-permissions --agent tech-lead --model "$MODEL" "$PROMPT"; then
              SUCCESS=1
              break
            fi
          done

          if [ "$SUCCESS" -ne 1 ]; then
            exit 1
          fi

      - name: Backfill /oc on bot-created issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue list --state open --limit 50 --json number,author,body --jq '.[] | @json' | while IFS= read -r issue; do
            num=$(echo "$issue" | jq -r '.number')
            author=$(echo "$issue" | jq -r '.author.login // ""')
            body=$(echo "$issue" | jq -r '.body // ""')

            if ! echo "$author" | grep -qiE '(github-actions|opencode-agent|\[bot\])'; then
              continue
            fi
            if echo "$body" | grep -qiE '(^|[[:space:]])/(oc|opencode)($|[[:space:]])'; then
              continue
            fi

            gh issue edit "$num" --body "/oc

$body"
          done
