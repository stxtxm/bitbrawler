name: Tech Lead Daily

on:
  schedule:
    # Run at 21h Paris time (= 19h UTC standard, 21h UTC+2)
    # Use 19h UTC to cover both standard and summer time
    - cron: '0 19 * * *'
  workflow_dispatch:

concurrency:
  group: tech-lead-analysis-lane
  cancel-in-progress: false

jobs:
  tech-lead:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: write
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 20

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install opencode
        run: npm install -g opencode-ai

      - name: Configure git
        run: |
          git config user.name "opencode-agent"
          git config user.email "agent@opencode.ai"

      - name: Fetch existing open issues (for duplicate detection)
        id: existing-issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue list --state open --limit 100 --json number,title,labels,updatedAt,body \
            --jq '.[] | {number, title, labels: [.labels[].name], updatedAt}' > /tmp/existing-issues.json 2>/dev/null || echo "[]" > /tmp/existing-issues.json
          echo "EXISTING_ISSUES=$(cat /tmp/existing-issues.json | wc -l) open issues found"
          echo "issue_count=$(cat /tmp/existing-issues.json | wc -l)" >> "$GITHUB_OUTPUT"

      - name: Mark issue scan start
        run: echo "TECH_LEAD_SCAN_START=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Analyze QA Stats
        run: |
          if [ -f qa/stats.json ]; then
            echo "📊 Found qa/stats.json, analyzing..."
            npx tsx scripts/analyze-qa-stats.ts
            echo "QA_ANALYSIS_DONE=true" >> "$GITHUB_ENV"
          else
            echo "⚠ No qa/stats.json found, skipping analysis"
            echo "QA_ANALYSIS_DONE=false" >> "$GITHUB_ENV"
          fi

      - name: Run Tech Lead agent
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          MODELS=(
            "opencode/deepseek-v4-flash-free"
            "opencode/nemotron"
            "opencode/big-pickle"
          )

          # Read latest QA analysis if available
          QA_REPORT=""
          if [ -f qa/analysis-latest.json ]; then
            QA_REPORT=$(cat qa/analysis-latest.json)
          fi

          EXISTING_ISSUES_JSON=$(cat /tmp/existing-issues.json 2>/dev/null || echo "[]")

          PROMPT="Tu es le tech-lead de Bitbrawler. Analyse le repo aujourd'hui en profondeur.

            ⚠️ RÈGLE OBLIGATOIRE : VÉRIFIE LES ISSUES EXISTANTES AVANT D'EN CRÉER

            Tu DOIS toujours commencer par lister les issues ouvertes existantes avec:
            gh issue list --state open --limit 50 --json number,title,labels

            Si une issue similaire existe DÉJÀ :
            - **Ne crée PAS** une nouvelle issue
            - **Commente** l'issue existante avec les nouvelles données QA
            - Si le bug est résolu dans les commits récents → ferme l'issue

            Issues ouvertes existantes:
            \`\`\`json
            ${EXISTING_ISSUES_JSON}
            \`\`\`

            ## 1. QA Stats Analysis (données de jeu réelles)
            \`\`\`json
            ${QA_REPORT:-"Pas de données QA disponibles."}
            \`\`\`

            À partir du rapport QA :
            - **PvE Analysis**: win rate PvE, monstres rencontrés, durée des combats
            - **Equipment**: objets portés, diversité
            - **Streak**: progression streak journalière
            - **HP Growth**: +5-30 HP/run est sain. Trop bas ou trop haut ?
            - **Lootbox Rarités**: si rares/epic manquent, ajuste LOOTBOX_RARITY_WEIGHTS
            - **Trends**: win rate last_3 vs last_5 vs all_time. Baisse +15% = problème
            - **Stats personnages**: équilibrées ~10, aucune < 7 ou > 13

            ## 2. Recherche web OBLIGATOIRE

            Tu dois faire AU MOINS 3 recherches web avec l'outil websearch. Cherche des idées concrètes pour améliorer Bitbrawler.

            ### Idées de recherches :
            1. **Engagement mécaniques** : cherche 'idle mobile game engagement mechanics 2026' ou 'best idle RPG retention systems'
            2. **Prestige systems** : cherche 'idle game prestige system design' ou 'reset mechanics that work'
            3. **Weekly events** : cherche 'mobile game weekly event ideas' ou 'limited time events idle games'
            4. **Collection systems** : cherche 'bestiary collection system mobile game' ou 'item compendium engagement'
            5. **Combat depth** : cherche 'mobile auto battler depth strategy' ou 'elemental weakness system pixel game'
            6. **UI/UX trends** : cherche 'pixel art mobile UI trends 2026' ou 'satisfying game juice animations'
            7. **Monetization** : cherche 'rewarded ads integration indie game' ou 'non-invasive mobile monetization 2026'

            ## 3. Analyser les commits récents
            - git log --oneline -30
            - Regarde les tendances : bugs fréquents, features ajoutées, domaines négligés

            ## 4. Actions à réaliser

            Pour chaque problème/amélioration :
            1. Vérifie si une issue similaire existe déjà (parcours la liste ci-dessus)
            2. **Si oui** → commente l'issue existante avec les nouvelles données
            3. **Si non** → crée une nouvelle issue

            Types d'issues:
            - **Mineures** avec /oc (ajustements constants, bugs, small features)
            - **Majeures** SANS /oc avec analyse détaillée

            Tu dois fermer les issues qui sont résolues par les commits récents.

            Format pour commenter une issue existante:
            gh issue comment #NUM --body '📊 Mise à jour: [date]
            - Nouvelles données QA: [contexte]
            - Suggestion: [ajustement si nécessaire]'

            Format pour fermer une issue résolue:
            gh issue close #NUM --comment 'Fermé: résolu par [commit/PR #]. Les stats QA récentes confirment.'

            Chaque proposition majeure doit inclure :
            - Pourquoi c'est adapté à Bitbrawler (mobile, pixel, idle)
            - Impact estimé sur la rétention
            - Effort estimé (1-5)
            - Inspiré de quels jeux/recherches"

          SUCCESS=0
          for MODEL in "${MODELS[@]}"; do
            echo "Trying model: $MODEL"
            if opencode run --dangerously-skip-permissions --agent tech-lead --model "$MODEL" "$PROMPT"; then
              echo "Model selected: $MODEL"
              SUCCESS=1
              break
            fi
            echo "Model failed: $MODEL"
          done

          if [ "$SUCCESS" -ne 1 ]; then
            echo "All model attempts failed."
            exit 1
          fi

      - name: Dispatch OpenCode for freshly created bot issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUES_FILE=/tmp/tech-lead-issues.txt

          gh api "repos/${GITHUB_REPOSITORY}/issues?state=open&sort=created&direction=desc&per_page=100&since=${TECH_LEAD_SCAN_START}" \
            --jq '.[] | select(.pull_request | not) | @base64' > "$ISSUES_FILE"

          FOUND=0
          while IFS= read -r row; do
            [ -z "$row" ] && continue

            json=$(printf '%s' "$row" | base64 --decode)
            number=$(echo "$json" | jq -r '.number')
            author=$(echo "$json" | jq -r '.user.login // ""')
            created_at=$(echo "$json" | jq -r '.created_at')
            body=$(echo "$json" | jq -r '.body // ""')

            if [[ "$created_at" < "$TECH_LEAD_SCAN_START" ]]; then
              continue
            fi

            if [ "$author" != "github-actions[bot]" ] && [ "$author" != "app/github-actions" ] && [ "$author" != "opencode-agent" ]; then
              continue
            fi

            if ! printf '%s' "$body" | grep -qiE '(^|[[:space:]])/(oc|opencode)($|[[:space:]])'; then
              continue
            fi

            echo "Dispatching OpenCode workflow for issue #$number..."
            gh workflow run opencode.yml -f issue_number="$number"
            FOUND=1
          done < "$ISSUES_FILE"

          if [ "$FOUND" -eq 0 ]; then
            echo "No fresh bot-created /oc issues found."
          fi
