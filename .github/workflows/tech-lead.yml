name: Tech Lead Daily

on:
  schedule:
    # Run at 21h Paris time (= 19h UTC standard, 21h UTC+2)
    # Use 19h UTC to cover both standard and summer time
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  tech-lead:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 20

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install opencode
        run: npm install -g opencode-ai

      - name: Configure git
        run: |
          git config user.name "opencode-agent"
          git config user.email "agent@opencode.ai"

      - name: Merge auto-generated PRs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRS=$(gh pr list --state open --json number,headRefName,title,author,labels,isDraft --jq '.[]')
          if [ -z "$PRS" ]; then
            echo "No open PRs to evaluate."
            exit 0
          fi

          echo "$PRS" | while IFS= read -r PR_JSON; do
            PR_NUM=$(echo "$PR_JSON" | jq -r '.number')
            PR_AUTHOR=$(echo "$PR_JSON" | jq -r '.author.login // ""')
            PR_DRAFT=$(echo "$PR_JSON" | jq -r '.isDraft')
            HAS_AUTO_LABEL=$(echo "$PR_JSON" | jq -r '[.labels[]?.name] | index("auto-generated") != null')
            echo "Processing PR #$PR_NUM..."

            # Only auto-merge bot-generated PRs (legacy label flow or current app/github-actions flow)
            if [ "$HAS_AUTO_LABEL" != "true" ] && [ "$PR_AUTHOR" != "app/github-actions" ] && [ "$PR_AUTHOR" != "opencode-agent" ]; then
              echo "ℹ️ PR #$PR_NUM is not from agent flow. Skipping."
              continue
            fi

            if [ "$PR_DRAFT" = "true" ]; then
              echo "⏳ PR #$PR_NUM is draft. Skipping."
              continue
            fi

            PR_MERGE_STATE=$(gh pr view "$PR_NUM" --json mergeStateStatus --jq '.mergeStateStatus // ""')
            if [ "$PR_MERGE_STATE" != "CLEAN" ] && [ "$PR_MERGE_STATE" != "HAS_HOOKS" ]; then
              echo "⏳ PR #$PR_NUM mergeStateStatus=$PR_MERGE_STATE. Skipping."
              continue
            fi

            echo "✅ Merging eligible agent PR #$PR_NUM..."
            gh pr merge "$PR_NUM" --squash --delete-branch || echo "⚠️ Failed to merge PR #$PR_NUM (may already be merged)"
          done

      - name: Run Tech Lead agent
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          MODELS=(
            "opencode/deepseek-v4-flash-free"
            "opencode/nemotron"
            "opencode/big-pickle"
          )

          PROMPT="Analyse le repo aujourd'hui. Consulte les stats QA (qa/stats.json), regarde les commits récents, merge les PRs si pas déjà fait, et crée des issues avec /oc pour les améliorations à faire."

          SUCCESS=0
          for MODEL in "${MODELS[@]}"; do
            echo "Trying model: $MODEL"
            if opencode run --dangerously-skip-permissions --agent tech-lead --model "$MODEL" "$PROMPT"; then
              echo "Model selected: $MODEL"
              SUCCESS=1
              break
            fi
            echo "Model failed: $MODEL"
          done

          if [ "$SUCCESS" -ne 1 ]; then
            echo "All model attempts failed."
            exit 1
          fi

      - name: Backfill /oc on bot-created issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUES=$(gh issue list --state open --limit 30 --json number,author,body --jq '.[]')
          if [ -z "$ISSUES" ]; then
            echo "No open issues to inspect."
            exit 0
          fi

          echo "$ISSUES" | while IFS= read -r ISSUE_JSON; do
            ISSUE_NUM=$(echo "$ISSUE_JSON" | jq -r '.number')
            ISSUE_AUTHOR=$(echo "$ISSUE_JSON" | jq -r '.author.login // ""')
            ISSUE_BODY=$(echo "$ISSUE_JSON" | jq -r '.body // ""')

            if ! echo "$ISSUE_AUTHOR" | grep -qiE '(github-actions|opencode-agent|\[bot\])'; then
              continue
            fi

            if echo "$ISSUE_BODY" | grep -qiE '(^|[[:space:]])/(oc|opencode)($|[[:space:]])'; then
              continue
            fi

            UPDATED_BODY="/oc

$ISSUE_BODY"
            gh issue edit "$ISSUE_NUM" --body "$UPDATED_BODY"
            echo "Added /oc to issue #$ISSUE_NUM"
          done
