name: Tech Lead Daily

on:
  schedule:
    # Run at 21h Paris time (= 19h UTC standard, 21h UTC+2)
    # Use 19h UTC to cover both standard and summer time
    - cron: '0 19 * * *'
  workflow_dispatch:

concurrency:
  group: tech-lead-merge-lane
  cancel-in-progress: false

jobs:
  tech-lead:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      actions: write
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 20

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install opencode
        run: npm install -g opencode-ai

      - name: Configure git
        run: |
          git config user.name "opencode-agent"
          git config user.email "agent@opencode.ai"

      - name: Mark issue scan start
        run: echo "TECH_LEAD_SCAN_START=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Merge eligible agent PRs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          chmod +x scripts/merge-eligible-prs.sh
          bash scripts/merge-eligible-prs.sh

      - name: Run QA Stats Analysis
        run: |
          if [ -f qa/stats.json ]; then
            npx tsx scripts/analyze-qa-stats.ts
            echo "QA_ANALYSIS_DONE=true" >> "$GITHUB_ENV"
          else
            echo "No qa/stats.json found, skipping analysis"
            echo "QA_ANALYSIS_DONE=false" >> "$GITHUB_ENV"
          fi

      - name: Run Tech Lead agent
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          MODELS=(
            "opencode/deepseek-v4-flash-free"
            "opencode/nemotron"
            "opencode/big-pickle"
          )

          # Read latest QA analysis if available
          QA_REPORT=""
          if [ -f qa/analysis-latest.json ]; then
            QA_REPORT=$(cat qa/analysis-latest.json)
          fi

          PROMPT="Tu es le tech-lead de Bitbrawler. Analyse le repo aujourd'hui.

          ## QA Stats Analysis (données de jeu réelles)
          \`\`\`json
          ${QA_REPORT:-"Pas de données QA disponibles."}
          \`\`\`

          ### Analyse à partir du rapport QA :

          1. **Issues** (🔴) : si le rapport liste des issues, crée des tickets GitHub avec /oc pour chaque issue critique (win rate anormal, error rate élevé, survivabilité trop basse).
          2. **Suggestions** (💡) : pour chaque suggestion du rapport, crée une issue /oc avec une proposition concrète de modification des constantes dans src/config/gameRules.ts.
          3. **HP/Survivabilité** : si hp_analysis est présent, vérifie si la survivabilité (HP restant après combat) est équilibrée. Entre 30%-80% est sain. Hors de cette fourchette, crée une issue /oc.
          4. **Lootbox Rarités** : si des raretés rares/epic manquent, suggère d'ajuster LOOTBOX_RARITY_WEIGHTS dans lootboxUtils.ts.
          5. **Trends** : regarde les tendances last_3 vs last_5 vs all_time. Si la win rate baisse de +15%, c'est un problème. Si elle monte de +15%, l'équilibrage s'améliore.
          6. **Stats des personnages** : vérifie si les stats initiales sont équilibrées (toutes proches de 10, aucune sous 7 ou au-dessus de 13).

          Consulte aussi les commits récents, merge les PRs éligibles."

          SUCCESS=0
          for MODEL in "${MODELS[@]}"; do
            echo "Trying model: $MODEL"
            if opencode run --dangerously-skip-permissions --agent tech-lead --model "$MODEL" "$PROMPT"; then
              echo "Model selected: $MODEL"
              SUCCESS=1
              break
            fi
            echo "Model failed: $MODEL"
          done

          if [ "$SUCCESS" -ne 1 ]; then
            echo "All model attempts failed."
            exit 1
          fi

      - name: Dispatch OpenCode for freshly created bot issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUES_FILE=/tmp/tech-lead-issues.txt

          gh api "repos/${GITHUB_REPOSITORY}/issues?state=open&sort=created&direction=desc&per_page=100&since=${TECH_LEAD_SCAN_START}" \
            --jq '.[] | select(.pull_request | not) | @base64' > "$ISSUES_FILE"

          FOUND=0
          while IFS= read -r row; do
            [ -z "$row" ] && continue

            json=$(printf '%s' "$row" | base64 --decode)
            number=$(echo "$json" | jq -r '.number')
            author=$(echo "$json" | jq -r '.user.login // ""')
            created_at=$(echo "$json" | jq -r '.created_at')
            body=$(echo "$json" | jq -r '.body // ""')

            if [[ "$created_at" < "$TECH_LEAD_SCAN_START" ]]; then
              continue
            fi

            if [ "$author" != "github-actions[bot]" ] && [ "$author" != "app/github-actions" ] && [ "$author" != "opencode-agent" ]; then
              continue
            fi

            if ! printf '%s' "$body" | grep -qiE '(^|[[:space:]])/(oc|opencode)($|[[:space:]])'; then
              continue
            fi

            echo "Dispatching OpenCode workflow for issue #$number..."
            gh workflow run opencode.yml -f issue_number="$number"
            FOUND=1
          done < "$ISSUES_FILE"

          if [ "$FOUND" -eq 0 ]; then
            echo "No fresh bot-created /oc issues found."
          fi
